<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ログイン | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#2E75B6;--blue-dark:#1F497D;--bg:#f0f4f8;--white:#fff;--border:#d0d7e3;--text:#1a2233;--muted:#6b7a99;--err:#c0392b;--radius:14px;--shadow:0 2px 16px rgba(0,0,0,.10)}
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:120px;padding-left:20px;padding-right:20px;padding-bottom:20px}
    .logo{text-align:center;margin-bottom:16px}
    .logo-wrap{width:150px;height:170px;background:#fff;border-radius:28px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 6px}
    .logo-icon{width:128px;height:128px;border-radius:0;display:block;margin:0;object-fit:contain}
    .logo h1{font-size:18px;font-weight:700;color:var(--blue-dark)}
    .logo p{font-size:12px;color:var(--muted);margin-top:4px}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;width:100%;max-width:360px}
    .field{margin-bottom:18px}
    label{display:block;font-size:13px;font-weight:600;color:var(--blue-dark);margin-bottom:6px}
    input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--white);color:var(--text)}
    input:focus{border-color:var(--blue)}
    .btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:background .15s}
    .btn:active{background:var(--blue-dark)}
    .forgot{text-align:center;margin-top:16px}
    .forgot a{font-size:13px;color:var(--blue);text-decoration:none;cursor:pointer}
    .forgot a:hover{text-decoration:underline}
    #errMsg{display:none;background:#fee;color:var(--err);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;text-align:center}
    /* 問い合わせモーダル */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.show{display:flex}
    .modal{background:#fff;border-radius:var(--radius);padding:24px 20px;width:100%;max-width:320px;text-align:center}
    .modal h2{font-size:15px;font-weight:700;color:var(--blue-dark);margin-bottom:10px}
    .modal p{font-size:14px;color:var(--text);line-height:1.7}
    .modal a{color:var(--blue);font-weight:700;font-size:16px}
    .modal-close{margin-top:20px;padding:10px 28px;background:var(--bg);border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;color:var(--muted)}
    .copyright{margin-top:24px;font-size:11px;color:#b0b8cc;text-align:center;letter-spacing:.02em}
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-wrap"><img src="/logo.png" class="logo-icon" alt="にこっと訪問看護ステーション"></div>
    <h1>にこっとweb App</h1>
    <p>for にこっと訪問看護ステーション</p>
  </div>

  <div class="card">
    <div id="errMsg"></div>
    <form id="loginForm">
      <div class="field">
        <label for="loginId">ログインID</label>
        <input type="text" id="loginId" autocomplete="username" placeholder="例：ubukata01" required inputmode="email" autocapitalize="none" autocorrect="off" spellcheck="false">
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="パスワードを入力" required>
      </div>
      <button type="submit" class="btn" id="loginBtn">ログイン</button>
    </form>
    <div id="faceIdSection" style="display:none">
      <div style="text-align:center;margin:16px 0 8px;font-size:12px;color:var(--muted)">または</div>
      <button type="button" id="faceIdBtn" class="btn" style="background:#1a1a2e" onclick="startFaceIdLogin()">
        🔐 Face ID でログイン
      </button>
    </div>
    <div class="forgot">
      <a href="/forgot-password">パスワードを忘れた方はこちら</a>
    </div>
  </div>

  <p class="copyright">© 2026 株式会社Yuw connect All rights reserved.</p>

  <script src="https://unpkg.com/@simplewebauthn/browser@13/dist/bundle/index.umd.min.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');
      btn.disabled = true; btn.textContent = '確認中...';
      err.style.display = 'none';

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          loginId:  document.getElementById('loginId').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (data.success) {
        location.href = '/';
      } else {
        err.textContent = data.error || 'ログインに失敗しました';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'ログイン';
      }
    });

    // Enterキーでサブミット
    document.getElementById('loginId').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });

    // ── FaceID / WebAuthn ──
    let faceIdCheckTimer;
    document.getElementById('loginId').addEventListener('input', () => {
      clearTimeout(faceIdCheckTimer);
      faceIdCheckTimer = setTimeout(checkFaceId, 500);
    });
    // ページロード時もチェック（ブラウザの自動入力対応）
    setTimeout(checkFaceId, 300);

    async function checkFaceId() {
      const section = document.getElementById('faceIdSection');
      section.style.display = 'none';
      if (typeof SimpleWebAuthnBrowser === 'undefined') return;
      if (!SimpleWebAuthnBrowser.browserSupportsWebAuthn()) return;
      try {
        const hasPlatform = await SimpleWebAuthnBrowser.platformAuthenticatorIsAvailable();
        if (!hasPlatform) return;
      } catch { return; }

      const loginId = document.getElementById('loginId').value.trim();
      if (!loginId) return;

      try {
        const resp = await fetch('/api/webauthn/has-credential?loginId=' + encodeURIComponent(loginId));
        const data = await resp.json();
        if (data.has) section.style.display = 'block';
      } catch {}
    }

    async function startFaceIdLogin() {
      const loginId = document.getElementById('loginId').value.trim();
      const btn = document.getElementById('faceIdBtn');
      const err = document.getElementById('errMsg');
      btn.disabled = true;
      err.style.display = 'none';

      try {
        const optResp = await fetch('/api/webauthn/login-options', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ loginId }),
        });
        const options = await optResp.json();
        if (!optResp.ok) throw new Error(options.error);

        const authResp = await SimpleWebAuthnBrowser.startAuthentication({ optionsJSON: options });

        const verifyResp = await fetch('/api/webauthn/login-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(authResp),
        });
        const result = await verifyResp.json();
        if (result.success) {
          location.href = '/';
        } else {
          throw new Error(result.error || '認証に失敗しました');
        }
      } catch (e) {
        err.textContent = e.name === 'NotAllowedError'
          ? 'Face IDがキャンセルされました'
          : (e.message || '認証に失敗しました');
        err.style.display = 'block';
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
