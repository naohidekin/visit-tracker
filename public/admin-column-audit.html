<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>列ずれチェック＆修復 | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#2E75B6;--blue-dark:#1F497D;--bg:#f0f4f8;--white:#fff;--border:#dce3ed;--text:#1a2233;--muted:#6b7a99;--ok:#0a7c42;--ok-bg:#e6f7ef;--ng:#c0392b;--ng-bg:#fdecea;--warn:#9a6700;--warn-bg:#fff7e0;--radius:14px}
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
    header{background:linear-gradient(135deg,#1F497D,#2E75B6);color:#fff;padding:14px 18px;font-weight:800;font-size:18px}
    .container{padding:16px;max-width:820px;margin:0 auto}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.08);padding:18px;margin-bottom:14px;border:1px solid rgba(0,0,0,.04)}
    .banner{border-radius:12px;padding:14px 16px;font-weight:700;margin-bottom:14px}
    .banner.ok{background:var(--ok-bg);color:var(--ok)}
    .banner.ng{background:var(--ng-bg);color:var(--ng)}
    .banner .sub{font-weight:500;font-size:13px;margin-top:6px;color:var(--text)}
    button{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:11px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
    button:active{opacity:.85}
    button.apply{background:var(--ok)}
    button:disabled{opacity:.5;cursor:default}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
    th{background:#f8faff;color:var(--blue-dark);padding:8px;text-align:left;font-size:12px;border-bottom:2px solid var(--border);white-space:nowrap}
    td{padding:8px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
    .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
    .tag.ok{background:var(--ok-bg);color:var(--ok)}
    .tag.fix{background:var(--warn-bg);color:var(--warn)}
    .tag.ng{background:var(--ng-bg);color:var(--ng)}
    .muted{color:var(--muted);font-size:12px}
    .section-title{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:8px}
    code{background:#eef2f7;border-radius:4px;padding:1px 6px;font-size:12px}
    .arrow{color:var(--warn);font-weight:800}
    details{margin-top:10px}
    summary{cursor:pointer;color:var(--blue);font-size:13px;font-weight:700}
    .loading{text-align:center;padding:28px;color:var(--muted)}
  </style>
</head>
<body>
<header>スタッフ列ずれ チェック＆修復</header>
<div class="container">
  <div class="card">
    <p class="muted" style="margin-bottom:10px">訪問件数のシート「列」とスタッフ登録情報のズレを確認・修復します。<b>修復は列番号の対応だけを直し、記録した件数（数字）は一切変更しません（元に戻せます）。</b></p>
    <button id="runBtn">チェックする</button>
  </div>
  <div id="result"></div>
</div>

<script src="/vendor/api-fetch.js"></script>
<script>
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  let PROPOSALS=[];

  function curStr(p){return p.type==='nurse'?('介護'+esc(p.current.kaigo_col||'-')+'/医療'+esc(p.current.iryo_col||'-')):esc(p.current.col||'-');}
  function propStr(p){if(!p.proposed)return '—';return p.type==='nurse'?('介護'+esc(p.proposed.kaigo_col)+'/医療'+esc(p.proposed.iryo_col)):esc(p.proposed.col);}
  function isChanged(p){if(p.status!=='matched')return false;return p.type==='nurse'?(p.current.kaigo_col!==p.proposed.kaigo_col||p.current.iryo_col!==p.proposed.iryo_col):(p.current.col!==p.proposed.col);}
  function changesPayload(){return PROPOSALS.filter(isChanged).map(p=>p.type==='nurse'?{id:p.id,kaigo_col:p.proposed.kaigo_col,iryo_col:p.proposed.iryo_col}:{id:p.id,col:p.proposed.col});}

  async function run(){
    const box=document.getElementById('result');
    box.innerHTML='<div class="card loading">チェック中...</div>';
    let data;
    try{
      const res=await fetch('/api/admin/column-audit');
      if(res.status===401){box.innerHTML='<div class="card banner ng">管理者としてログインしてください。<div class="sub"><a href="/admin">管理画面へ</a></div></div>';return;}
      if(!res.ok)throw new Error((await res.json()).error||('HTTP '+res.status));
      data=await res.json();
    }catch(e){box.innerHTML='<div class="card banner ng">取得に失敗しました: '+esc(e.message)+'</div>';return;}

    PROPOSALS=data.proposals||[];
    const s=data.summary;
    let html='';
    if(s.likelyDesynced){
      html+='<div class="banner ng">⚠️ 列ずれが見つかりました'
        +'<div class="sub">修正が必要: '+s.needsRepair+'件'
        +(s.duplicateColumnAssignments?('／列の重複: '+s.duplicateColumnAssignments+'件'):'')
        +(s.unresolved?('／自動で特定できず（要手動）: '+s.unresolved+'件'):'')+'</div></div>';
    }else{
      html+='<div class="banner ok">✅ 列ずれは見つかりませんでした<div class="sub">'+esc(String(data.year))+'年'+esc(String(data.month))+'月のシートで確認</div></div>';
    }
    if(s.sheetReadError)html+='<div class="card banner ng">シート読み取りエラー: '+esc(s.sheetReadError)+'</div>';

    // 修復案テーブル
    html+='<div class="card"><div class="section-title">修復案（シート見出しを正として、各スタッフの列を直します）</div>'
      +'<table><tr><th>氏名</th><th>種別</th><th>現在の列</th><th></th><th>正しい列</th><th>状態</th></tr>';
    for(const p of PROPOSALS){
      let tag,arrow='';
      if(p.status==='unmatched')tag='<span class="tag ng">見つからない（手動）</span>';
      else if(p.status==='ambiguous')tag='<span class="tag ng">候補複数（手動）</span>';
      else if(isChanged(p)){tag='<span class="tag fix">修正</span>';arrow='<span class="arrow">→</span>';}
      else tag='<span class="tag ok">OK</span>';
      html+='<tr><td>'+esc(p.name)+'</td><td>'+esc(p.type)+'</td><td>'+curStr(p)+'</td><td>'+arrow+'</td><td>'+propStr(p)+'</td><td>'+tag+'</td></tr>';
    }
    html+='</table>';
    const n=changesPayload().length;
    if(n>0){
      html+='<div style="margin-top:14px"><button class="apply" id="applyBtn">この内容で修復する（'+n+'件）</button>'
        +'<p class="muted" style="margin-top:8px">※ 記録した件数は変更されません。列の対応だけを直します。適用後にもう一度「チェックする」で確認できます。</p></div>';
    }else if(!s.sheetReadError){
      html+='<p class="muted" style="margin-top:10px">自動修正できる項目はありません。'+(s.unresolved?'「手動」の項目は氏名がシート見出しに見当たらないため、個別に確認が必要です。':'すべて正しい状態です。')+'</p>';
    }
    html+='</div>';

    // 重複列
    if((data.duplicateCols||[]).length){
      html+='<div class="card"><div class="section-title">同じ列を複数人が指しています（修復で解消されます）</div><table><tr><th>列</th><th>スタッフ</th></tr>';
      for(const d of data.duplicateCols)html+='<tr><td><code>'+esc(d.col)+'</code></td><td>'+esc(d.staff.join(' ／ '))+'</td></tr>';
      html+='</table></div>';
    }

    // 参考: 見出し全体マップ
    html+='<div class="card"><details><summary>参考：シート見出しの全体（列→内容）</summary><table><tr><th>列</th><th>種別</th><th>姓/氏名</th><th>見出し(row3/row4)</th></tr>';
    for(const c of (data.columnMap||[]))html+='<tr><td><code>'+esc(c.col)+'</code></td><td>'+esc(c.kind||'')+'</td><td>'+esc(c.surname||'')+'</td><td class="muted">'+esc(c.raw3||'')+' / '+esc(c.raw4||'')+'</td></tr>';
    html+='</table></details></div>';

    box.innerHTML=html;
    const ab=document.getElementById('applyBtn');
    if(ab)ab.addEventListener('click',apply);
  }

  async function apply(){
    const changes=changesPayload();
    if(!changes.length)return;
    if(!confirm(changes.length+'件のスタッフの列を修復します。記録した数字は変わりません。よろしいですか？'))return;
    const btn=document.getElementById('applyBtn');
    btn.disabled=true;btn.textContent='修復中...';
    try{
      const res=await apiFetch('/api/admin/column-audit/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({changes})});
      const data=await res.json();
      if(!data.success)throw new Error(data.error||'修復失敗');
      alert('修復しました（'+data.applied.length+'件）。もう一度チェックして確認してください。');
      run();
    }catch(e){alert('エラー: '+e.message);btn.disabled=false;btn.textContent='この内容で修復する';}
  }

  document.getElementById('runBtn').addEventListener('click',run);
</script>
</body>
</html>
