<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>列ずれチェック | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#2E75B6;--blue-dark:#1F497D;--bg:#f0f4f8;--white:#fff;--border:#dce3ed;--text:#1a2233;--muted:#6b7a99;--ok:#0a7c42;--ok-bg:#e6f7ef;--ng:#c0392b;--ng-bg:#fdecea;--radius:14px}
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
    header{background:linear-gradient(135deg,#1F497D,#2E75B6);color:#fff;padding:14px 18px;font-weight:800;font-size:18px}
    .container{padding:16px;max-width:760px;margin:0 auto}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.08);padding:18px;margin-bottom:14px;border:1px solid rgba(0,0,0,.04)}
    .banner{border-radius:12px;padding:14px 16px;font-weight:700;margin-bottom:14px}
    .banner.ok{background:var(--ok-bg);color:var(--ok)}
    .banner.ng{background:var(--ng-bg);color:var(--ng)}
    .banner .sub{font-weight:500;font-size:13px;margin-top:6px;color:var(--text)}
    button{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:11px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
    button:active{opacity:.85}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
    th{background:#f8faff;color:var(--blue-dark);padding:8px;text-align:left;font-size:12px;border-bottom:2px solid var(--border);white-space:nowrap}
    td{padding:8px;border-bottom:1px solid #f0f4f8;vertical-align:top}
    .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
    .tag.ok{background:var(--ok-bg);color:var(--ok)}
    .tag.ng{background:var(--ng-bg);color:var(--ng)}
    .muted{color:var(--muted);font-size:12px}
    .section-title{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:8px}
    code{background:#eef2f7;border-radius:4px;padding:1px 6px;font-size:12px}
    .loading{text-align:center;padding:28px;color:var(--muted)}
  </style>
</head>
<body>
<header>スタッフ列ずれチェック（読み取り専用）</header>
<div class="container">
  <div class="card">
    <p class="muted" style="margin-bottom:10px">訪問件数の記録が入るシートの「列」と、スタッフの登録情報がずれていないかを確認します。データは一切変更しません。</p>
    <button id="runBtn">チェックする</button>
  </div>
  <div id="result"></div>
</div>

<script src="/vendor/api-fetch.js"></script>
<script>
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  async function run(){
    const box=document.getElementById('result');
    box.innerHTML='<div class="card loading">チェック中...</div>';
    let data;
    try{
      const res=await fetch('/api/admin/column-audit');
      if(res.status===401){box.innerHTML='<div class="card banner ng">管理者としてログインしてください。<div class="sub"><a href="/admin">管理画面へ</a></div></div>';return;}
      if(!res.ok){throw new Error((await res.json()).error||('HTTP '+res.status));}
      data=await res.json();
    }catch(e){box.innerHTML='<div class="card banner ng">取得に失敗しました: '+esc(e.message)+'</div>';return;}

    const s=data.summary;
    let html='';
    if(s.likelyDesynced){
      html+='<div class="banner ng">⚠️ 列ずれの疑いがあります（要確認）'
        +'<div class="sub">重複した列: '+s.duplicateColumnAssignments+'件／見出し不一致: '+s.headerMismatches+'件'
        +(s.missingColumnAssignments?('／列未設定: '+s.missingColumnAssignments+'件'):'')+'</div></div>';
    }else{
      html+='<div class="banner ok">✅ 列ずれは検出されませんでした'
        +'<div class="sub">対象スタッフ '+s.staffWithColumns+'名・'+esc(String(data.year))+'年'+esc(String(data.month))+'月のシートで確認</div></div>';
    }
    if(s.sheetReadError){html+='<div class="card banner ng">シート読み取りエラー: '+esc(s.sheetReadError)+'<div class="sub">見出しとの突き合わせはできませんでした（重複チェックのみ有効）。</div></div>';}

    if(data.duplicateCols.length){
      html+='<div class="card"><div class="section-title">同じ列を複数人が指しています（要修復）</div><table><tr><th>列</th><th>スタッフ</th></tr>';
      for(const d of data.duplicateCols) html+='<tr><td><code>'+esc(d.col)+'</code></td><td>'+esc(d.staff.join(' ／ '))+'</td></tr>';
      html+='</table></div>';
    }

    html+='<div class="card"><div class="section-title">スタッフごとの確認</div><table><tr><th>氏名</th><th>種別</th><th>登録された列</th><th>シート見出し</th><th>判定</th></tr>';
    for(const c of data.checks){
      const stored=c.type==='nurse'?('介護 '+esc(c.stored.kaigo_col||'-')+' / 医療 '+esc(c.stored.iryo_col||'-')):esc(c.stored.col||'-');
      const head=c.type==='nurse'?(esc(c.headerAtStored.kaigo||'(空)')+' / '+esc(c.headerAtStored.iryo||'(空)')):esc(c.headerAtStored||'(空)');
      const tag=c.looksCorrect?'<span class="tag ok">OK</span>':'<span class="tag ng">要確認</span>';
      html+='<tr><td>'+esc(c.name)+'</td><td>'+esc(c.type)+'</td><td>'+stored+'</td><td>'+head+'</td><td>'+tag+'</td></tr>';
    }
    html+='</table><p class="muted" style="margin-top:8px">「要確認」は、登録された列の見出しにその人の名前が見当たらない状態です（データが別の列に取り残されている可能性）。</p></div>';

    box.innerHTML=html;
  }
  document.getElementById('runBtn').addEventListener('click',run);
</script>
</body>
</html>
