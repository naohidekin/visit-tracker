<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>お知らせ | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#2E75B6;--blue-dark:#1F497D;
      --bg:#f0f4f8;--white:#fff;--border:#dce3ed;--text:#1a2233;--muted:#6b7a99;
      --radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.08)
    }
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}
    header{background:linear-gradient(135deg, #1F497D 0%, #2E75B6 50%, #4A90C4 100%);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 2px 12px rgba(31,73,125,.25)}
    .header-brand{display:flex;align-items:stretch;gap:10px}
    .header-accent{width:3px;border-radius:3px;background:rgba(255,255,255,0.4);flex-shrink:0}
    .header-brand-text{display:flex;flex-direction:column;justify-content:center;gap:3px}
    .header-app-name{font-size:10px;font-weight:500;opacity:.6;letter-spacing:.08em;text-transform:uppercase}
    .header-page-name{font-size:18px;font-weight:800;letter-spacing:.02em;line-height:1.1;text-shadow:0 1px 2px rgba(0,0,0,.15)}
    .header-user-name{font-size:11px;font-weight:600;opacity:.85;margin-top:1px}
    .hamburger{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:5px;flex-shrink:0}
    .hamburger:active{background:rgba(255,255,255,.2)}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .menu-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.15)}
    .menu-overlay.open{display:block}
    .menu-drawer{position:absolute;top:58px;right:8px;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.16);min-width:180px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
    .menu-drawer a,.menu-drawer button{display:block;width:100%;padding:15px 22px;font-size:14px;font-weight:600;color:var(--text);text-decoration:none;text-align:left;background:none;border:none;cursor:pointer;border-bottom:1px solid #f3f5f8;font-family:inherit;transition:background .1s}
    .menu-drawer a:last-child,.menu-drawer button:last-child{border-bottom:none}
    .menu-drawer a:hover,.menu-drawer button:hover{background:#f5f7fa}
    .menu-drawer a:active,.menu-drawer button:active{background:#edf0f5}
    .menu-drawer .menu-logout{color:#c0392b}
    .menu-link-wrap{display:flex;align-items:center;justify-content:space-between}
    .unread-badge{background:#e74c3c;color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
    /* ── PC: スマホ幅中央固定 ── */
    .page-wrapper{width:100%;min-height:100vh}
    .menu-overlay-inner{max-width:390px;margin:0 auto;height:100%;position:relative}
    @media(min-width:480px){
      body{background:#c8d8e8;display:flex;justify-content:center;align-items:flex-start}
      .page-wrapper{max-width:390px;background:var(--bg);box-shadow:0 0 48px rgba(0,0,0,.18);min-height:100vh}
    }
    .container{padding:16px;max-width:480px;margin:0 auto}

    /* ── お知らせカード ── */
    .notice-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:box-shadow .15s;position:relative;border:1px solid rgba(0,0,0,.04)}
    .notice-card:active{box-shadow:0 1px 8px rgba(0,0,0,.06)}
    .notice-card.unread{border-left:4px solid var(--blue)}
    .notice-card.unread .notice-title{font-weight:800}
    .notice-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .notice-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.4}
    .notice-date{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-top:2px}
    .notice-body{display:none;margin-top:12px;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;border-top:1px solid #f0f4f8;padding-top:12px}
    .notice-card.expanded .notice-body{display:block}
    .notice-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0;margin-top:4px}
    .notice-card.expanded .notice-chevron{transform:rotate(180deg)}
    .unread-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:6px}
    .read-dot{width:8px;height:8px;flex-shrink:0}
    .source-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-right:6px;vertical-align:middle}
    .source-badge.system{background:#fff3cd;color:#856404;border:1px solid #ffc107}
    .source-badge.admin{background:#e8f4fd;color:#1565c0;border:1px solid #90caf9}

    .empty-msg{text-align:center;color:var(--muted);font-size:14px;padding:40px 0}
    .spinner{text-align:center;color:var(--muted);font-size:13px;padding:30px 0}
  </style>
</head>
<body>
<div class="page-wrapper">
<header>
  <div class="header-brand">
    <div class="header-accent"></div>
    <div class="header-brand-text">
      <span class="header-app-name">にこっと Web App</span>
      <span class="header-page-name">お知らせ</span>
      <span class="header-user-name" id="headerUserName"></span>
    </div>
  </div>
  <button class="hamburger" id="hamburgerBtn" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-overlay-inner">
    <div class="menu-drawer" id="menuDrawer">
      <a href="/">入力画面</a>
      <a href="/history">月次実績</a>
      <a href="/notices"><span class="menu-link-wrap">お知らせ<span class="unread-badge" id="menuBadge" style="display:none"></span></span></a>
      <a href="/change-password">PW変更</a>
      <a href="/manual">使い方</a>
      <button class="menu-logout" id="menuLogoutBtn">ログアウト</button>
    </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="spinner" id="spinner">読み込み中...</div>
  <div id="noticesList"></div>
  <div class="empty-msg" id="emptyMsg" style="display:none">お知らせはありません</div>
</div>
</div>

<script src="/vendor/api-fetch.js"></script>
<script src="/vendor/common.js"></script>
<script>
  initCommonUI();

  async function init() {
    const me = await fetch('/api/me').then(r => r.json());
    if (!me.id) { location.href = '/login'; return; }

    const elUser = document.getElementById('headerUserName');
    if (elUser) elUser.textContent = `👤 ${me.name}（${me.type === 'nurse' ? '看護師' : me.type === 'office' ? '事務' : me.type}）`;

    if (me.leave_oncall_enabled) {
      const drawer = document.getElementById('menuDrawer');
      const historyLink = drawer.querySelector('a[href="/history"]');
      if (historyLink) {
        const leaveLink = document.createElement('a');
        leaveLink.href = '/leave';
        leaveLink.textContent = '有給管理';
        historyLink.after(leaveLink);
        if (me.oncall_eligible) {
          const oncallLink = document.createElement('a');
          oncallLink.href = '/oncall';
          oncallLink.textContent = 'オンコール';
          leaveLink.after(oncallLink);
        }
      }
    }

    await loadNotices();
  }

  async function loadNotices() {
    const res = await fetch('/api/notices');
    const { notices } = await res.json();
    const list = document.getElementById('noticesList');
    const spinner = document.getElementById('spinner');
    const emptyMsg = document.getElementById('emptyMsg');

    spinner.style.display = 'none';

    if (!notices.length) {
      emptyMsg.style.display = 'block';
      return;
    }

    list.innerHTML = notices.map(n => `
      <div class="notice-card ${n.isRead ? '' : 'unread'}" data-id="${esc(n.id)}" data-read="${n.isRead ? 'true' : 'false'}">
        <div class="notice-header">
          ${n.isRead ? '<div class="read-dot"></div>' : '<div class="unread-dot"></div>'}
          <div style="flex:1;min-width:0">
            <div class="notice-title">${n.source === 'system' ? '<span class="source-badge system">運営</span>' : ''}${esc(n.title)}</div>
          </div>
          <span class="notice-date">${formatDate(n.date)}</span>
          <span class="notice-chevron">▼</span>
        </div>
        <div class="notice-body">${esc(n.body)}</div>
      </div>
    `).join('');
  }

  // ── #noticesList イベント委譲 ───────────────────────────────────
  document.getElementById('noticesList').addEventListener('click', e => {
    const card = e.target.closest('.notice-card');
    if (card) toggleNotice(card);
  });

  async function toggleNotice(el) {
    const id = el.dataset.id;
    const wasRead = el.dataset.read === 'true';
    const isExpanding = !el.classList.contains('expanded');
    // collapse all others
    document.querySelectorAll('.notice-card.expanded').forEach(c => {
      if (c !== el) c.classList.remove('expanded');
    });
    el.classList.toggle('expanded');

    if (isExpanding && !wasRead) {
      await apiFetch(`/api/notices/${id}/read`, { method: 'POST' });
      el.classList.remove('unread');
      const dot = el.querySelector('.unread-dot');
      if (dot) { dot.className = 'read-dot'; }
      el.dataset.read = 'true';
      await updateUnreadBadge();
    }
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return `${d.getMonth() + 1}月${d.getDate()}日`;
  }

  init();
</script>
</body>
</html>
