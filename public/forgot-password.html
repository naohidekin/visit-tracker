<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>パスワードリセット | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/utilities.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#2E75B6;--blue-dark:#1F497D;--bg:#f0f4f8;--white:#fff;--border:#d0d7e3;--text:#1a2233;--muted:#6b7a99;--err:#c0392b;--ok:#0a7c42;--radius:14px;--shadow:0 2px 16px rgba(0,0,0,.10)}
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:120px;padding-left:20px;padding-right:20px;padding-bottom:20px}
    .logo{text-align:center;margin-bottom:16px}
    .logo-wrap{width:150px;height:170px;background:#fff;border-radius:28px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 6px}
    .logo-icon{width:128px;height:128px;border-radius:0;display:block;margin:0;object-fit:contain}
    .logo h1{font-size:18px;font-weight:700;color:var(--blue-dark)}
    .logo p{font-size:12px;color:var(--muted);margin-top:4px}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;width:100%;max-width:360px}
    .card h2{font-size:15px;font-weight:700;color:var(--blue-dark);margin-bottom:6px}
    .card .desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:18px}
    .field{margin-bottom:18px}
    label{display:block;font-size:13px;font-weight:600;color:var(--blue-dark);margin-bottom:6px}
    input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--white);color:var(--text)}
    input:focus{border-color:var(--blue)}
    .btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:background .15s}
    .btn:active{background:var(--blue-dark)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .back-link{text-align:center;margin-top:16px}
    .back-link a{font-size:13px;color:var(--blue);text-decoration:none}
    .back-link a:hover{text-decoration:underline}
    #errMsg{display:none;background:#fee;color:var(--err);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;text-align:center}
    #successMsg{display:none;background:#e6f7ef;color:var(--ok);border-radius:8px;padding:14px;font-size:13px;line-height:1.7;text-align:center}
    .copyright{margin-top:24px;font-size:11px;color:#b0b8cc;text-align:center;letter-spacing:.02em}
    .success-icon{font-size:24px;margin-bottom:8px}
    .success-title{font-weight:700;margin-bottom:8px}
    .success-hint{margin-top:12px;font-size:11px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-wrap"><img src="/logo.png" class="logo-icon" alt="にこっと訪問看護ステーション"></div>
    <h1>にこっとweb App</h1>
    <p>パスワードリセット</p>
  </div>

  <div class="card">
    <div id="formSection">
      <h2>パスワードをお忘れの方</h2>
      <p class="desc">ログインIDを入力してください。登録されたメールアドレスにリセットリンクを送信します。</p>
      <div id="errMsg"></div>
      <form id="forgotForm">
        <div class="field">
          <label for="staffId">ログインID</label>
          <input type="text" id="staffId" placeholder="例：ubukata01" required autocapitalize="none" autocorrect="off" spellcheck="false">
        </div>
        <button type="submit" class="btn" id="submitBtn">リセットリンクを送信</button>
      </form>
    </div>
    <div id="successMsg">
      <div class="success-icon">✉️</div>
      <div class="success-title">メールを送信しました</div>
      <div>ご登録のメールアドレスにリセットリンクを送信しました。メールをご確認ください。</div>
      <div class="success-hint">
        メールが届かない場合は、メールアドレスが登録されていない可能性があります。<br>管理者にご連絡ください。
      </div>
    </div>
    <div class="back-link">
      <a href="/login">ログイン画面に戻る</a>
    </div>
  </div>

  <p class="copyright">&copy; 2026 株式会社Yuw connect All rights reserved.</p>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errMsg');
      btn.disabled = true; btn.textContent = '送信中...';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ staffId: document.getElementById('staffId').value.trim() }),
        });
        const data = await res.json();

        if (res.status === 429) {
          err.textContent = data.error;
          err.style.display = 'block';
          btn.disabled = false; btn.textContent = 'リセットリンクを送信';
          return;
        }

        // 成功（IDの存在有無に関わらず同じ表示）
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } catch (_) {
        err.textContent = '送信に失敗しました。もう一度お試しください。';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'リセットリンクを送信';
      }
    });
  </script>
</body>
</html>
