<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>新しいパスワードを設定 | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/utilities.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#2E75B6;--blue-dark:#1F497D;--bg:#f0f4f8;--white:#fff;--border:#d0d7e3;--text:#1a2233;--muted:#6b7a99;--err:#c0392b;--ok:#0a7c42;--radius:14px;--shadow:0 2px 16px rgba(0,0,0,.10)}
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:120px;padding-left:20px;padding-right:20px;padding-bottom:20px}
    .logo{text-align:center;margin-bottom:16px}
    .logo-wrap{width:150px;height:170px;background:#fff;border-radius:28px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 6px}
    .logo-icon{width:128px;height:128px;border-radius:0;display:block;margin:0;object-fit:contain}
    .logo h1{font-size:18px;font-weight:700;color:var(--blue-dark)}
    .logo p{font-size:12px;color:var(--muted);margin-top:4px}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;width:100%;max-width:360px}
    .card h2{font-size:15px;font-weight:700;color:var(--blue-dark);margin-bottom:6px}
    .card .desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:18px}
    .field{margin-bottom:18px}
    label{display:block;font-size:13px;font-weight:600;color:var(--blue-dark);margin-bottom:6px}
    input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--white);color:var(--text)}
    input:focus{border-color:var(--blue)}
    .btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:background .15s}
    .btn:active{background:var(--blue-dark)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .back-link{text-align:center;margin-top:16px}
    .back-link a{font-size:13px;color:var(--blue);text-decoration:none}
    .back-link a:hover{text-decoration:underline}
    #errMsg{display:none;background:#fee;color:var(--err);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;text-align:center}
    .status-card{text-align:center;padding:20px 0}
    .status-icon{font-size:40px;margin-bottom:12px}
    .status-title{font-size:15px;font-weight:700;color:var(--blue-dark);margin-bottom:8px}
    .status-desc{font-size:13px;color:var(--muted);line-height:1.7}
    .pw-hint{font-size:11px;color:var(--muted);margin-top:4px}
    .copyright{margin-top:24px;font-size:11px;color:#b0b8cc;text-align:center;letter-spacing:.02em}
    .loading-text{color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-wrap"><img src="/logo.png" class="logo-icon" alt="にこっと訪問看護ステーション"></div>
    <h1>にこっとweb App</h1>
    <p>パスワード再設定</p>
  </div>

  <div class="card">
    <!-- ロード中 -->
    <div id="loadingSection" class="status-card">
      <div class="loading-text">確認中...</div>
    </div>

    <!-- トークン無効 -->
    <div id="invalidSection" class="d-none">
      <div class="status-card">
        <div class="status-icon">⚠️</div>
        <div class="status-title">リンクが無効です</div>
        <div class="status-desc">
          リセットリンクの有効期限が切れているか、既に使用されています。<br>
          もう一度リセットをリクエストしてください。
        </div>
      </div>
      <a href="/forgot-password" class="btn link-block mt-16">もう一度リクエスト</a>
    </div>

    <!-- パスワード入力フォーム -->
    <div id="formSection" class="d-none">
      <h2>新しいパスワードを設定</h2>
      <p class="desc">新しいパスワードを入力してください。</p>
      <div id="errMsg"></div>
      <form id="resetForm">
        <div class="field">
          <label for="newPassword">新しいパスワード</label>
          <input type="password" id="newPassword" placeholder="新しいパスワード" required autocomplete="new-password" minlength="8">
          <div class="pw-hint">8文字以上</div>
        </div>
        <div class="field">
          <label for="confirmPassword">パスワード確認</label>
          <input type="password" id="confirmPassword" placeholder="もう一度入力" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="submitBtn">パスワードを変更する</button>
      </form>
    </div>

    <!-- 完了 -->
    <div id="successSection" class="d-none">
      <div class="status-card">
        <div class="status-icon">✅</div>
        <div class="status-title">パスワードを変更しました</div>
        <div class="status-desc">
          新しいパスワードでログインできます。
        </div>
      </div>
      <a href="/login" class="btn link-block mt-16">ログイン画面へ</a>
    </div>

    <div class="back-link">
      <a href="/login">ログイン画面に戻る</a>
    </div>
  </div>

  <p class="copyright">&copy; 2026 株式会社Yuw connect All rights reserved.</p>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    async function verifyToken() {
      if (!token) {
        showInvalid(); return;
      }
      try {
        const res = await fetch('/api/reset-password/verify?token=' + encodeURIComponent(token));
        const data = await res.json();
        if (data.valid) {
          showForm();
        } else {
          showInvalid();
        }
      } catch {
        showInvalid();
      }
    }

    function showInvalid() {
      document.getElementById('loadingSection').style.display = 'none';
      document.getElementById('invalidSection').style.display = 'block';
    }
    function showForm() {
      document.getElementById('loadingSection').style.display = 'none';
      document.getElementById('formSection').style.display = 'block';
    }

    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errMsg');
      const newPw = document.getElementById('newPassword').value;
      const confirmPw = document.getElementById('confirmPassword').value;

      err.style.display = 'none';

      if (newPw !== confirmPw) {
        err.textContent = 'パスワードが一致しません';
        err.style.display = 'block';
        return;
      }
      if (newPw.length < 8) {
        err.textContent = 'パスワードは8文字以上で設定してください';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true; btn.textContent = '変更中...';

      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: newPw, confirmPassword: confirmPw }),
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('formSection').style.display = 'none';
          document.getElementById('successSection').style.display = 'block';
        } else {
          err.textContent = data.error || 'エラーが発生しました';
          err.style.display = 'block';
          btn.disabled = false; btn.textContent = 'パスワードを変更する';
        }
      } catch (_) {
        err.textContent = '通信エラーが発生しました。もう一度お試しください。';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'パスワードを変更する';
      }
    });

    verifyToken();
  </script>
</body>
</html>
