<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>パスワード変更 | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#2E75B6;--blue-dark:#1F497D;--bg:#f0f4f8;--white:#fff;--border:#d0d7e3;--text:#1a2233;--muted:#6b7a99;--err:#c0392b;--ok:#0a7c42;--ok-bg:#e6f7ef;--radius:14px;--shadow:0 2px 16px rgba(0,0,0,.10)}
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
    header{background:var(--blue);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{color:#fff;text-decoration:none;font-size:20px;line-height:1;flex-shrink:0;opacity:.85}
    .header-brand{display:flex;align-items:stretch;gap:10px}
    .header-accent{width:3px;border-radius:3px;background:rgba(255,255,255,0.5);flex-shrink:0}
    .header-brand-text{display:flex;flex-direction:column;justify-content:center;gap:3px}
    .header-app-name{font-size:10px;font-weight:500;opacity:.65;letter-spacing:.05em}
    .header-page-name{font-size:17px;font-weight:800;letter-spacing:.02em;line-height:1.1}
    .header-user-name{font-size:11px;font-weight:600;opacity:.85;margin-top:1px}
    .hamburger{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;flex-shrink:0}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .menu-overlay{display:none;position:fixed;inset:0;z-index:100}
    .menu-overlay.open{display:block}
    .menu-drawer{position:absolute;top:52px;right:0;background:#fff;border-radius:0 0 0 12px;box-shadow:0 4px 20px rgba(0,0,0,.18);min-width:160px;overflow:hidden}
    .menu-drawer a,.menu-drawer button{display:block;width:100%;padding:14px 20px;font-size:14px;font-weight:600;color:var(--text);text-decoration:none;text-align:left;background:none;border:none;cursor:pointer;border-bottom:1px solid #f0f0f0;font-family:inherit}
    .menu-drawer a:last-child,.menu-drawer button:last-child{border-bottom:none}
    .menu-drawer a:hover,.menu-drawer button:hover{background:#f0f4f8}
    .menu-drawer .menu-logout{color:#c0392b}
    /* ── PC: スマホ幅中央固定 ── */
    .page-wrapper{width:100%;min-height:100vh}
    .menu-overlay-inner{max-width:390px;margin:0 auto;height:100%;position:relative}
    @media(min-width:480px){
      body{background:#c8d8e8;display:flex;justify-content:center;align-items:flex-start}
      .page-wrapper{max-width:390px;background:var(--bg);box-shadow:0 0 48px rgba(0,0,0,.18);min-height:100vh}
    }
    .container{padding:20px 16px;max-width:480px;margin:0 auto}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 20px}
    .field{margin-bottom:18px}
    label{display:block;font-size:13px;font-weight:600;color:var(--blue-dark);margin-bottom:6px}
    input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--white);color:var(--text)}
    input:focus{border-color:var(--blue)}
    .btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s}
    .btn:active{background:var(--blue-dark)}
    .btn:disabled{background:#9ab3d1;cursor:default}
    #errMsg{display:none;background:#fee;color:var(--err);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
    #okMsg{display:none;background:var(--ok-bg);color:var(--ok);border-radius:8px;padding:10px 14px;font-size:14px;font-weight:600;margin-bottom:16px;text-align:center}
    .copyright{font-size:11px;color:#b0b8cc;text-align:center;padding:20px 16px;letter-spacing:.02em}
  </style>
</head>
<body>
<div class="page-wrapper">
  <header>
    <div class="header-left">
      <a href="/" class="back-btn" aria-label="戻る">←</a>
      <div class="header-brand">
        <div class="header-accent"></div>
        <div class="header-brand-text">
          <span class="header-app-name">にこっと Web App</span>
          <span class="header-page-name">パスワード変更</span>
          <span class="header-user-name" id="headerUserName"></span>
        </div>
      </div>
    </div>
    <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()">
      <div class="menu-overlay-inner">
      <div class="menu-drawer" onclick="event.stopPropagation()">
        <a href="/">入力画面</a>
        <a href="/history">月次実績</a>
        <a href="/leave">有給管理</a>
        <a href="/notices"><span style="display:flex;align-items:center;justify-content:space-between">お知らせ<span id="menuBadge" style="display:none;background:#e74c3c;color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;align-items:center;justify-content:center;padding:0 5px"></span></span></a>
        <a href="/change-password">PW変更</a>
        <a href="/manual">使い方</a>
        <button class="menu-logout" onclick="logout()">ログアウト</button>
      </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="card" id="faceIdCard" style="display:none;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px">🔐 Face ID 設定</div>
      <div id="faceIdStatus" style="font-size:14px;margin-bottom:14px"></div>
      <button class="btn" id="faceIdActionBtn" style="font-size:14px;padding:12px"></button>
    </div>
    <div class="card">
      <div id="errMsg"></div>
      <div id="okMsg"></div>
      <form id="pwForm">
        <div class="field">
          <label for="current">現在のパスワード</label>
          <input type="password" id="current" autocomplete="current-password" required>
        </div>
        <div class="field">
          <label for="newPw">新しいパスワード（4〜20文字）</label>
          <input type="password" id="newPw" autocomplete="new-password" required>
        </div>
        <div class="field">
          <label for="confirm">新しいパスワード（確認）</label>
          <input type="password" id="confirm" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">変更する</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/@simplewebauthn/browser@13/dist/bundle/index.umd.min.js"></script>
  <script>
    let meData = null;
    fetch('/api/me').then(r => { if (!r.ok) location.href = '/login'; return r.json(); }).then(d => {
      meData = d;
      const el = document.getElementById('headerUserName');
      if (el) el.textContent = `👤 ${d.name}（${d.type === 'nurse' ? '看護師' : d.type}）`;
      initFaceIdCard();
    }).catch(() => {});
    function toggleMenu() {
      document.getElementById('hamburgerBtn').classList.toggle('open');
      document.getElementById('menuOverlay').classList.toggle('open');
    }
    function closeMenu() {
      document.getElementById('hamburgerBtn').classList.remove('open');
      document.getElementById('menuOverlay').classList.remove('open');
    }
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/login';
    }

    document.getElementById('pwForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errMsg');
      const ok  = document.getElementById('okMsg');
      err.style.display = 'none'; ok.style.display = 'none';
      btn.disabled = true; btn.textContent = '変更中...';

      const pw = document.getElementById('newPw').value;
      if (pw.length < 4 || pw.length > 20) {
        err.textContent = 'パスワードは4〜20文字で設定してください';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = '変更する';
        return;
      }

      const res = await fetch('/api/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          currentPassword: document.getElementById('current').value,
          newPassword:     document.getElementById('newPw').value,
          confirmPassword: document.getElementById('confirm').value,
        }),
      });
      const data = await res.json();

      if (data.success) {
        ok.textContent = 'パスワードを変更しました';
        ok.style.display = 'block';
        document.getElementById('pwForm').reset();
        setTimeout(() => location.href = '/', 1800);
      } else {
        err.textContent = data.error || '変更に失敗しました';
        err.style.display = 'block';
      }
      btn.disabled = false; btn.textContent = '変更する';
    });

    // ── FaceID管理 ──
    async function initFaceIdCard() {
      if (typeof SimpleWebAuthnBrowser === 'undefined') return;
      if (!SimpleWebAuthnBrowser.browserSupportsWebAuthn()) return;
      try {
        const hasPlatform = await SimpleWebAuthnBrowser.platformAuthenticatorIsAvailable();
        if (!hasPlatform) return;
      } catch { return; }
      if (!meData) return;

      const card = document.getElementById('faceIdCard');
      card.style.display = 'block';
      await refreshFaceIdStatus();
    }

    async function refreshFaceIdStatus() {
      const statusEl = document.getElementById('faceIdStatus');
      const actionBtn = document.getElementById('faceIdActionBtn');

      try {
        const resp = await fetch('/api/webauthn/has-credential?loginId=' + encodeURIComponent(meData.id));
        const data = await resp.json();

        if (data.has) {
          statusEl.innerHTML = '<span style="color:var(--ok)">✓ 登録済み</span>';
          actionBtn.textContent = '登録を解除する';
          actionBtn.style.background = 'var(--err)';
          actionBtn.onclick = deleteFaceId;
        } else {
          statusEl.innerHTML = '<span style="color:var(--muted)">未設定</span>';
          actionBtn.textContent = 'Face IDを設定する';
          actionBtn.style.background = 'var(--blue)';
          actionBtn.onclick = registerFaceIdFromSettings;
        }
      } catch {
        statusEl.innerHTML = '<span style="color:var(--muted)">状態を確認できません</span>';
        actionBtn.style.display = 'none';
      }
    }

    async function registerFaceIdFromSettings() {
      const btn = document.getElementById('faceIdActionBtn');
      btn.disabled = true; btn.textContent = '設定中...';
      try {
        const optResp = await fetch('/api/webauthn/register-options', { method: 'POST' });
        if (!optResp.ok) throw new Error('オプション取得に失敗');
        const options = await optResp.json();
        const regResp = await SimpleWebAuthnBrowser.startRegistration({ optionsJSON: options });
        const verifyResp = await fetch('/api/webauthn/register-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(regResp),
        });
        const result = await verifyResp.json();
        if (result.success) {
          localStorage.setItem('faceid_prompt_dismissed', 'true');
          await refreshFaceIdStatus();
          alert('Face IDの設定が完了しました！');
        } else {
          throw new Error(result.error || '登録に失敗しました');
        }
      } catch (e) {
        if (e.name !== 'NotAllowedError') {
          alert('設定に失敗しました: ' + (e.message || ''));
        }
      }
      btn.disabled = false;
    }

    async function deleteFaceId() {
      if (!confirm('Face IDの登録を解除しますか？\n次回からパスワードでのログインが必要になります。')) return;
      const btn = document.getElementById('faceIdActionBtn');
      btn.disabled = true; btn.textContent = '解除中...';
      try {
        const resp = await fetch('/api/webauthn/delete', { method: 'POST' });
        const data = await resp.json();
        if (data.success) {
          localStorage.removeItem('faceid_prompt_dismissed');
          await refreshFaceIdStatus();
        } else {
          throw new Error(data.error || '解除に失敗しました');
        }
      } catch (e) {
        alert('解除に失敗しました: ' + (e.message || ''));
      }
      btn.disabled = false;
    }
  <script>
  (async()=>{try{const r=await fetch('/api/notices/unread-count');const{count}=await r.json();const b=document.getElementById('menuBadge');if(count>0){b.textContent=count;b.style.display='flex';}}catch{}})();
  </script>
  <p class="copyright">© 2026 株式会社Yuw connect All rights reserved.</p>
</div><!-- /page-wrapper -->
</body>
</html>
