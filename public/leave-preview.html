<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>有給管理</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,"Hiragino Kaku Gothic ProN",sans-serif;background:#f0f4f8;margin:0;padding:0}
    .page-wrapper{width:100%;background:#f0f4f8}
    header{background:#2E75B6;color:#fff;padding:24px 40px;display:flex;align-items:center;justify-content:space-between}
    .header-brand{display:flex;align-items:stretch;gap:16px}
    .header-accent{width:6px;border-radius:3px;background:rgba(255,255,255,0.5)}
    .header-brand-text{display:flex;flex-direction:column;gap:6px}
    .header-app-name{font-size:20px;font-weight:500;opacity:.65}
    .header-page-name{font-size:38px;font-weight:800;line-height:1.1}
    .hamburger{background:none;border:none;display:flex;flex-direction:column;gap:10px}
    .hamburger span{display:block;width:44px;height:5px;background:#fff;border-radius:3px}
    .container{padding:40px}

    .balance-card{background:linear-gradient(135deg,#2E75B6 0%,#1F497D 100%);color:#fff;border-radius:24px;padding:48px;margin-bottom:36px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.12)}
    .balance-label{font-size:26px;opacity:.8;margin-bottom:16px}
    .balance-number{font-size:120px;font-weight:900;line-height:1}
    .balance-unit{font-size:40px;font-weight:600;margin-left:8px}
    .balance-detail{display:flex;justify-content:center;gap:40px;margin-top:24px;font-size:22px;opacity:.85}
    .balance-detail-item{display:flex;flex-direction:column;align-items:center;gap:6px}
    .balance-detail-val{font-size:34px;font-weight:700}

    .info-card{background:#fff;border-radius:24px;box-shadow:0 2px 16px rgba(0,0,0,.10);padding:32px 40px;margin-bottom:36px}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:2px solid #f0f4f8}
    .info-row:last-child{border-bottom:none}
    .info-label{font-size:26px;color:#6b7a99;font-weight:600}
    .info-value{font-size:28px;font-weight:700;color:#1a2233}
    .info-countdown{display:flex;align-items:center;gap:10px}
    .countdown-num{font-size:56px;font-weight:900;color:#2E75B6}
    .countdown-unit{font-size:26px;color:#6b7a99}
    .countdown-sub{font-size:22px;color:#6b7a99}
    .celebration-badge{display:inline-block;background:#fff3cd;color:#856404;border:2px solid #ffc107;font-size:22px;font-weight:700;padding:6px 18px;border-radius:10px}

    .card{background:#fff;border-radius:24px;box-shadow:0 2px 16px rgba(0,0,0,.10);padding:32px 40px;margin-bottom:36px}
    .card-title{font-size:32px;font-weight:800;color:#1a2233;margin-bottom:28px}
    .form-group{margin-bottom:28px}
    .form-label{font-size:24px;font-weight:700;color:#6b7a99;margin-bottom:12px;display:block}
    .form-input{width:100%;padding:18px 24px;border:2px solid #d0d7e3;border-radius:16px;font-size:28px;font-family:inherit;background:#fff;color:#1a2233}
    .type-selector{display:flex;gap:16px}
    .type-btn{flex:1;padding:18px 16px;border:2px solid #d0d7e3;border-radius:16px;background:#fff;font-size:26px;font-weight:600;text-align:center;color:#1a2233}
    .type-btn.active{background:#2E75B6;color:#fff;border-color:#2E75B6}
    .btn-submit{width:100%;padding:28px;border:none;border-radius:20px;background:#2E75B6;color:#fff;font-size:34px;font-weight:800}

    .request-item{border-bottom:2px solid #f0f4f8;padding:24px 0}
    .request-item:last-child{border-bottom:none}
    .request-header{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .request-dates{font-size:30px;font-weight:700;color:#1a2233}
    .request-type{font-size:24px;color:#6b7a99;margin-top:4px}
    .request-meta{margin-top:10px}
    .request-created{font-size:22px;color:#6b7a99}
    .request-reason{font-size:24px;color:#6b7a99;margin-top:8px}
    .status-badge{display:inline-block;font-size:24px;font-weight:700;padding:8px 18px;border-radius:10px}
    .status-pending{background:#fef3c7;color:#9a3412}
    .status-approved{background:#dcfce7;color:#166534}
    .status-rejected{background:#fee2e2;color:#b91c1c}
    .btn-cancel{padding:10px 20px;border:2px solid #c0392b;border-radius:12px;background:#fff;color:#c0392b;font-size:22px;font-weight:600}
  </style>
</head>
<body>
<div class="page-wrapper">
<header>
  <div class="header-brand">
    <div class="header-accent"></div>
    <div class="header-brand-text">
      <span class="header-app-name">にこっと Web App</span>
      <span class="header-page-name">有給管理</span>
    </div>
  </div>
  <button class="hamburger"><span></span><span></span><span></span></button>
</header>
<div class="container">
  <div class="balance-card">
    <div class="balance-label">有給残日数</div>
    <div><span class="balance-number">12</span><span class="balance-unit">日</span></div>
    <div class="balance-detail">
      <div class="balance-detail-item"><span>付与</span><span class="balance-detail-val">10日</span></div>
      <div class="balance-detail-item"><span>繰越</span><span class="balance-detail-val">4日</span></div>
      <div class="balance-detail-item"><span>調整</span><span class="balance-detail-val">+0日</span></div>
      <div class="balance-detail-item"><span>使用済</span><span class="balance-detail-val">2日</span></div>
    </div>
  </div>

  <div class="info-card">
    <div class="info-row">
      <span class="info-label">入職日</span>
      <span class="info-value">2023年4月1日</span>
    </div>
    <div class="info-row">
      <span class="info-label">お祝い休暇（3日）</span>
      <span class="info-value"><span class="celebration-badge">残り 45 日で期限</span></span>
    </div>
    <div class="info-row">
      <span class="info-label">次回有給付与</span>
      <div style="text-align:right">
        <div class="info-countdown">
          <span class="countdown-num">187</span>
          <span class="countdown-unit">日後</span>
        </div>
        <div class="countdown-sub">2026年10月1日 に 12日 付与</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">有給申請</div>
    <div class="form-group">
      <label class="form-label">種別</label>
      <div class="type-selector">
        <button class="type-btn active">全日</button>
        <button class="type-btn">午前半休</button>
        <button class="type-btn">午後半休</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">開始日</label>
      <input type="date" class="form-input" value="2026-03-29">
    </div>
    <div class="form-group">
      <label class="form-label">終了日（複数日の場合）</label>
      <input type="date" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">理由（任意）</label>
      <input type="text" class="form-input" value="私用">
    </div>
    <button class="btn-submit">申請する</button>
  </div>

  <div class="card">
    <div class="card-title">申請履歴</div>
    <div class="request-item">
      <div class="request-header">
        <div>
          <div class="request-dates">4/15 〜 4/16</div>
          <div class="request-type">全日（2日）</div>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <span class="status-badge status-pending">承認待ち</span>
          <button class="btn-cancel">取消</button>
        </div>
      </div>
      <div class="request-reason">理由: 私用</div>
      <div class="request-meta"><span class="request-created">申請日: 3/25 09:30</span></div>
    </div>
    <div class="request-item">
      <div class="request-header">
        <div>
          <div class="request-dates">3/10</div>
          <div class="request-type">午前半休（0.5日）</div>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <span class="status-badge status-approved">承認済</span>
          <button class="btn-cancel">取消</button>
        </div>
      </div>
      <div class="request-reason">理由: 通院</div>
      <div class="request-meta"><span class="request-created">申請日: 3/5 14:00</span></div>
    </div>
    <div class="request-item">
      <div class="request-header">
        <div>
          <div class="request-dates">2/20</div>
          <div class="request-type">全日（1日）</div>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <span class="status-badge status-rejected">却下</span>
        </div>
      </div>
      <div class="request-meta"><span class="request-created">申請日: 2/15 10:00</span></div>
    </div>
  </div>
</div>
</div>
</body>
</html>
