<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>オンコール | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#2E75B6;--blue-dark:#1F497D;
      --bg:#f0f4f8;--white:#fff;--border:#dce3ed;--text:#1a2233;--muted:#6b7a99;
      --radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.08);
      --green:#375623;--ok:#27ae60;--warn:#f39c12;--danger:#c0392b
    }
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}
    header{background:linear-gradient(135deg, #1F497D 0%, #2E75B6 50%, #4A90C4 100%);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 2px 12px rgba(31,73,125,.25)}
    .header-brand{display:flex;align-items:stretch;gap:10px}
    .header-accent{width:3px;border-radius:3px;background:rgba(255,255,255,0.4);flex-shrink:0}
    .header-brand-text{display:flex;flex-direction:column;justify-content:center;gap:3px}
    .header-app-name{font-size:10px;font-weight:500;opacity:.6;letter-spacing:.08em;text-transform:uppercase}
    .header-page-name{font-size:18px;font-weight:800;letter-spacing:.02em;line-height:1.1;text-shadow:0 1px 2px rgba(0,0,0,.15)}
    .header-user-name{font-size:11px;font-weight:600;opacity:.85;margin-top:1px}
    .hamburger{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:5px;flex-shrink:0}
    .hamburger:active{background:rgba(255,255,255,.2)}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .menu-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.15)}
    .menu-overlay.open{display:block}
    .menu-drawer{position:absolute;top:58px;right:8px;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.16);min-width:180px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
    .menu-drawer a,.menu-drawer button{display:block;width:100%;padding:15px 22px;font-size:14px;font-weight:600;color:var(--text);text-decoration:none;text-align:left;background:none;border:none;cursor:pointer;border-bottom:1px solid #f3f5f8;font-family:inherit;transition:background .1s}
    .menu-drawer a:last-child,.menu-drawer button:last-child{border-bottom:none}
    .menu-drawer a:hover,.menu-drawer button:hover{background:#f5f7fa}
    .menu-drawer a:active,.menu-drawer button:active{background:#edf0f5}
    .menu-drawer .menu-logout{color:#c0392b}
    .menu-link-wrap{display:flex;align-items:center;justify-content:space-between}
    .unread-badge{background:#e74c3c;color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
    .page-wrapper{width:100%;min-height:100vh}
    .menu-overlay-inner{max-width:390px;margin:0 auto;height:100%;position:relative}
    @media(min-width:480px){
      body{background:#c8d8e8;display:flex;justify-content:center;align-items:flex-start}
      .page-wrapper{max-width:390px;background:var(--bg);box-shadow:0 0 48px rgba(0,0,0,.18);min-height:100vh}
    }
    .container{padding:12px;max-width:480px;margin:0 auto}

    .month-selector{margin-bottom:10px}
    .month-selector select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .2s, box-shadow .2s}
    .month-selector select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.12)}

    .summary-card{background:linear-gradient(135deg,#2E75B6 0%,#1F497D 100%);color:#fff;border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
    .summary-title{font-size:11px;opacity:.8;margin-bottom:6px;text-align:center}

    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:10px;border:1px solid rgba(0,0,0,.04)}
    .card-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px}

    /* ── 横バーゲージ ── */
    .gauge-wrap{position:relative}
    .gauge-bar-track{height:28px;background:linear-gradient(90deg,#e0e6ee 0%,#d0d7e3 100%);border-radius:14px;position:relative;overflow:hidden}
    .gauge-bar-fill{height:100%;background:linear-gradient(90deg,rgba(39,174,96,0.05),rgba(39,174,96,0.3),rgba(39,174,96,0.7),#27ae60);border-radius:14px;transition:width .5s ease;position:absolute;left:0;top:0}
    .gauge-bike{position:absolute;top:50%;transition:left .5s ease;transform:translate(-50%,-50%);z-index:2;line-height:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2))}
    .gauge-bike svg{width:24px;height:24px}
    .gauge-bar-labels{display:flex;justify-content:space-between;align-items:baseline;margin-top:5px}
    .gauge-info-main{font-size:11px;font-weight:700;color:var(--text)}
    .gauge-info-sub{font-size:11px;color:var(--muted)}

    .form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .2s, box-shadow .2s}
    .form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.12)}

    /* ── プルダウン（picker） ── */
    .picker-wrap{position:relative}
    .picker-btn{width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:9px;font-size:17px;font-weight:700;font-family:inherit;background:var(--white);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s, box-shadow .2s}
    .picker-btn.open{border-color:var(--blue);border-bottom-left-radius:0;border-bottom-right-radius:0}
    .picker-dropdown{position:absolute;bottom:calc(100% - 1px);left:0;right:0;background:var(--white);border:1px solid var(--blue);border-bottom:none;border-top-left-radius:10px;border-top-right-radius:10px;max-height:220px;overflow-y:auto;z-index:50;box-shadow:0 -6px 20px rgba(0,0,0,.12)}
    .picker-item{padding:10px 16px;font-size:15px;cursor:pointer;border-bottom:1px solid #f0f4f8;transition:background .1s}
    .picker-item.selected{background:var(--blue);color:#fff;font-weight:700}
    .picker-item:hover:not(.selected){background:#f0f4f8}
    .val-empty{color:var(--muted);font-weight:400}
    .chevron{font-size:12px;color:var(--muted)}

    .btn-submit{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg, #2E75B6 0%, #3a8ad4 100%);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .1s, box-shadow .15s;box-shadow:0 3px 12px rgba(46,117,182,.3)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}
    .btn-submit:active:not(:disabled){transform:scale(0.98)}

    .record-item{border-bottom:1px solid #f0f4f8;padding:12px 0;display:flex;align-items:center;justify-content:space-between}
    .record-item:last-child{border-bottom:none}
    .record-date{font-size:14px;font-weight:700}
    .record-detail{font-size:12px;color:var(--muted);margin-top:2px}
    .record-actions{display:flex;gap:6px;flex-shrink:0}
    .btn-edit,.btn-delete{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid}
    .btn-edit{border-color:var(--blue);background:#fff;color:var(--blue)}
    .btn-delete{border-color:var(--danger);background:#fff;color:var(--danger)}

    .empty-msg{text-align:center;color:var(--muted);font-size:14px;padding:24px 0}
    .spinner{text-align:center;color:var(--muted);font-size:13px;padding:30px 0}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s}
    .toast.show{opacity:1}

    .picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .picker-col-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-align:center}
  </style>
</head>
<body>
<div class="page-wrapper">
<header>
  <div class="header-brand">
    <div class="header-accent"></div>
    <div class="header-brand-text">
      <span class="header-app-name">にこっと Web App</span>
      <span class="header-page-name">オンコール</span>
      <span class="header-user-name" id="headerUserName"></span>
    </div>
  </div>
  <button class="hamburger" id="hamburgerBtn" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-overlay-inner">
    <div class="menu-drawer" id="menuDrawer">
      <a href="/">入力画面</a>
      <a href="/history">月次実績</a>
      <a href="/notices"><span class="menu-link-wrap">お知らせ<span class="unread-badge" id="menuBadge" style="display:none"></span></span></a>
      <a href="/change-password">PW変更</a>
      <a href="/manual">使い方</a>
      <button class="menu-logout" id="menuLogoutBtn">ログアウト</button>
    </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="spinner" id="spinner">読み込み中...</div>

  <div class="month-selector" id="monthSelector" style="display:none">
    <select id="monthSelect"></select>
  </div>

  <div class="summary-card" id="summaryCard" style="display:none">
    <div class="summary-title">月間オンコール実績</div>
    <div style="text-align:center;margin-bottom:4px">
      <span style="font-size:14px;font-weight:600;opacity:.8">合計</span><span style="font-size:32px;font-weight:900;line-height:1;margin-left:4px" id="sumTime">0.0</span><span style="font-size:14px;font-weight:600;margin-left:3px">時間</span>
    </div>
    <div style="display:flex;justify-content:center;gap:20px">
      <div style="text-align:center"><span style="font-size:10px;opacity:.7">交通費</span><span style="font-size:13px;font-weight:700;margin-left:3px" id="sumTransport">0</span><span style="font-size:10px;opacity:.8">件</span></div>
      <div style="text-align:center"><span style="font-size:10px;opacity:.7">担当日数</span><span style="font-size:13px;font-weight:700;margin-left:3px" id="sumDays">0</span><span style="font-size:10px;opacity:.8">日</span></div>
    </div>
  </div>

  <div class="card" id="gaugeCard" style="display:none">
    <div class="card-title">オンコール累計時間</div>
    <div class="gauge-wrap">
      <div class="gauge-bar-track">
        <div class="gauge-bar-fill" id="gaugeBar" style="width:0%"></div>
        <div class="gauge-bike" id="gaugeBike" style="left:8%">
          <svg viewBox="0 0 40 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 後輪 -->
            <circle cx="9" cy="19" r="7.5" stroke="#1F497D" stroke-width="2" fill="none"/>
            <!-- 前輪 -->
            <circle cx="31" cy="19" r="7.5" stroke="#1F497D" stroke-width="2" fill="none"/>
            <!-- フレーム -->
            <path d="M9 19 L18 7 L31 19 M18 7 L18 19 L31 19" stroke="#1F497D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <!-- ハンドル -->
            <path d="M18 7 L28 5.5 L32 10" stroke="#1F497D" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <!-- サドル -->
            <line x1="15" y1="6.5" x2="21" y2="6.5" stroke="#1F497D" stroke-width="2.4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="gauge-bar-labels">
        <span class="gauge-info-main">累計 <span id="gaugeTotal">0.0</span>h → <span id="gaugeDays">0</span>日付与</span>
        <span class="gauge-info-sub" id="gaugeNext">あと 15.0h</span>
      </div>
    </div>
  </div>

  <div class="card" id="formCard" style="display:none">
    <div class="card-title">オンコール入力</div>
    <div style="margin-bottom:8px">
      <input type="date" class="form-input" id="inputDate" style="padding:8px 12px;font-size:14px">
    </div>
    <div class="picker-grid">
      <div>
        <div class="picker-col-label">合計時間</div>
        <div class="picker-wrap">
          <button type="button" class="picker-btn" id="timeBtn" style="padding:10px 12px;font-size:16px">
            <span><span id="timeDisplay" class="val-empty">0.0</span><span style="font-size:12px;font-weight:500;color:var(--muted);margin-left:3px">時間</span></span>
            <span class="chevron">▼</span>
          </button>
          <div class="picker-dropdown" id="timeList" style="display:none"></div>
        </div>
      </div>
      <div>
        <div class="picker-col-label">交通費</div>
        <div class="picker-wrap">
          <button type="button" class="picker-btn" id="transportBtn" style="padding:10px 12px;font-size:16px">
            <span><span id="transportDisplay" class="val-empty">0</span><span style="font-size:12px;font-weight:500;color:var(--muted);margin-left:3px">件</span></span>
            <span class="chevron">▼</span>
          </button>
          <div class="picker-dropdown" id="transportList" style="display:none"></div>
        </div>
      </div>
    </div>
    <button class="btn-submit" id="submitBtn" style="margin-top:10px;padding:12px">登録する</button>
  </div>

  <div class="card" id="historyCard" style="display:none">
    <div class="card-title">入力履歴</div>
    <div id="recordsList"></div>
    <div class="empty-msg" id="emptyMsg" style="display:none">この月のオンコール記録はありません</div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="/vendor/api-fetch.js"></script>
<script src="/vendor/common.js"></script>
<script>
  initCommonUI();
  const WD = ['日','月','火','水','木','金','土'];
  let allRecords = [];

  // 選択値
  const pv = { time: 0, transport: 0 };

  // オプション生成
  const TIME_OPTS = [];
  for (let v = 0; v <= 10.0 + 0.001; v += 0.5) TIME_OPTS.push(Math.round(v * 10) / 10);

  const TRANSPORT_OPTS = [];
  for (let i = 0; i <= 10; i++) TRANSPORT_OPTS.push(i);

  async function init() {
    const me = await fetch('/api/me').then(r => r.json());
    if (!me.id) { location.href = '/login'; return; }

    const elUser = document.getElementById('headerUserName');
    if (elUser) elUser.textContent = `👤 ${me.name}（${me.type === 'nurse' ? '看護師' : me.type === 'office' ? '事務' : me.type}）`;

    // アクセスガード: 看護師 + oncall_eligible、またはleave_oncall_enabled
    if (!me.leave_oncall_enabled && (me.type !== 'nurse' || !me.oncall_eligible)) {
      location.href = '/';
      return;
    }

    if (me.leave_oncall_enabled) {
      const drawer = document.getElementById('menuDrawer');
      const historyLink = drawer.querySelector('a[href="/history"]');
      if (historyLink) {
        const leaveLink = document.createElement('a');
        leaveLink.href = '/leave';
        leaveLink.textContent = '有給管理';
        const oncallLink = document.createElement('a');
        oncallLink.href = '/oncall';
        oncallLink.textContent = 'オンコール';
        historyLink.after(leaveLink, oncallLink);
      }
    }

    const sel = document.getElementById('monthSelect');
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const val = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      const label = d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
      sel.innerHTML += `<option value="${val}">${label}</option>`;
    }

    document.getElementById('inputDate').value = now.toISOString().slice(0, 10);

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('monthSelector').style.display = '';
    document.getElementById('summaryCard').style.display = '';
    document.getElementById('gaugeCard').style.display = '';
    document.getElementById('formCard').style.display = '';
    document.getElementById('historyCard').style.display = '';

    await loadData();
  }

  async function loadData() {
    const month = document.getElementById('monthSelect').value;
    const [recRes, sumRes] = await Promise.all([
      fetch('/api/oncall/records?month=' + month),
      fetch('/api/oncall/monthly-summary?month=' + month),
    ]);
    const { records } = await recRes.json();
    const sumData = await sumRes.json();
    const summary = sumData.summary;
    allRecords = records;

    document.getElementById('sumTime').textContent = (summary.totalMinutes / 60).toFixed(1);
    document.getElementById('sumTransport').textContent = summary.totalTransportCount;
    document.getElementById('sumDays').textContent = summary.recordDays;

    // ゲージ更新
    updateGauge(sumData.allTimeTotalMinutes || 0, sumData.oncallLeaveDays || 0, sumData.nextThresholdMinutes || 900);

    renderRecords(records);
    onDateChange();
  }

  function renderRecords(records) {
    const list = document.getElementById('recordsList');
    const emptyMsg = document.getElementById('emptyMsg');
    if (!records.length) { list.innerHTML = ''; emptyMsg.style.display = 'block'; return; }
    emptyMsg.style.display = 'none';
    list.innerHTML = records.map(r => {
      const d = new Date(r.date + 'T00:00:00');
      const dateLabel = `${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）`;
      const hours = (r.totalMinutes / 60).toFixed(1);
      return `
        <div class="record-item">
          <div>
            <div class="record-date">${dateLabel}</div>
            <div class="record-detail">${hours}時間 / 交通費${r.transportCount}件</div>
          </div>
          <div class="record-actions">
            <button class="btn-edit" data-action="edit-record" data-date="${esc(r.date)}">編集</button>
            <button class="btn-delete" data-action="delete-record" data-id="${esc(r.id)}">削除</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── ピッカー ──
  function closeAllPickers() {
    ['time', 'transport'].forEach(name => {
      document.getElementById(name + 'List').style.display = 'none';
      document.getElementById(name + 'Btn').classList.remove('open');
    });
  }

  function togglePicker(name) {
    const list = document.getElementById(name + 'List');
    const btn = document.getElementById(name + 'Btn');
    const isOpen = list.style.display !== 'none';
    closeAllPickers();
    if (!isOpen) {
      buildList(name);
      list.style.display = 'block';
      btn.classList.add('open');
    }
  }

  function buildList(name) {
    const list = document.getElementById(name + 'List');
    const opts = name === 'time' ? TIME_OPTS : TRANSPORT_OPTS;
    list.innerHTML = '';
    for (const opt of opts) {
      const item = document.createElement('div');
      item.className = 'picker-item' + (pv[name] === opt ? ' selected' : '');
      if (name === 'time') {
        item.textContent = opt.toFixed(1) + '　時間';
      } else {
        item.textContent = opt + '　件';
      }
      item.onclick = () => selectVal(name, opt);
      list.appendChild(item);
    }
    const sel = list.querySelector('.selected');
    if (sel) setTimeout(() => sel.scrollIntoView({ block: 'center' }), 0);
  }

  function selectVal(name, val) {
    pv[name] = val;
    const display = document.getElementById(name + 'Display');
    if (name === 'time') {
      display.textContent = val.toFixed(1);
    } else {
      display.textContent = val;
    }
    display.classList.remove('val-empty');
    closeAllPickers();
  }

  function onDateChange() {
    const date = document.getElementById('inputDate').value;
    const existing = allRecords.find(r => r.date === date);
    if (existing) {
      pv.time = (existing.totalMinutes || 0) / 60;
      pv.transport = existing.transportCount || 0;
    } else {
      pv.time = 0; pv.transport = 0;
    }
    document.getElementById('timeDisplay').textContent = pv.time.toFixed(1);
    document.getElementById('transportDisplay').textContent = pv.transport;
  }

  // ── #recordsList イベント委譲 ───────────────────────────────────
  document.getElementById('recordsList').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    if (btn.dataset.action === 'edit-record')   editRecord(btn.dataset.date);
    if (btn.dataset.action === 'delete-record') deleteRecord(btn.dataset.id);
  });

  function editRecord(date) {
    document.getElementById('inputDate').value = date;
    onDateChange();
    document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
  }

  async function deleteRecord(id) {
    if (!confirm('このレコードを削除しますか？')) return;
    try {
      const res = await apiFetch('/api/oncall/records/' + id, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'エラー'); return; }
      showToast('削除しました');
      await loadData();
    } catch { showToast('エラーが発生しました'); }
  }

  async function submitRecord() {
    const date = document.getElementById('inputDate').value;
    if (!date) { showToast('日付を選択してください'); return; }
    if (pv.time === 0 && pv.transport === 0) {
      showToast('いずれかの値を入力してください');
      return;
    }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    try {
      const res = await apiFetch('/api/oncall/records', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date, count: 0, totalHours: pv.time, transportCount: pv.transport }),
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'エラー'); return; }
      showToast('登録しました');
      await loadData();
    } catch { showToast('エラーが発生しました'); }
    finally { btn.disabled = false; }
  }

  function updateGauge(allMinutes, days, nextThreshold) {
    const totalHours = allMinutes / 60;
    const currentBandMinutes = allMinutes - days * 900;
    const pct = Math.min(100, Math.round(currentBandMinutes / 900 * 100));
    document.getElementById('gaugeBar').style.width = pct + '%';
    document.getElementById('gaugeBike').style.left = Math.max(8, pct) + '%';
    document.getElementById('gaugeTotal').textContent = totalHours.toFixed(1);
    document.getElementById('gaugeDays').textContent = days;
    const remaining = ((nextThreshold - allMinutes) / 60).toFixed(1);
    document.getElementById('gaugeNext').textContent = `あと ${remaining}hで+1日`;
  }

  // イベントリスナー
  document.getElementById('monthSelect').addEventListener('change', loadData);
  document.getElementById('inputDate').addEventListener('change', onDateChange);
  document.getElementById('timeBtn').addEventListener('click', () => togglePicker('time'));
  document.getElementById('transportBtn').addEventListener('click', () => togglePicker('transport'));
  document.getElementById('submitBtn').addEventListener('click', submitRecord);

  // ピッカー外クリックで閉じる
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.picker-wrap')) closeAllPickers();
  });

  init();
</script>
</body>
</html>
