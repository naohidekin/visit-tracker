<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>有給管理 | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#2E75B6;--blue-dark:#1F497D;
      --bg:#f0f4f8;--white:#fff;--border:#dce3ed;--text:#1a2233;--muted:#6b7a99;
      --radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.08);
      --green:#375623;--ok:#27ae60;--warn:#f39c12;--danger:#c0392b
    }
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}
    header{background:linear-gradient(135deg, #1F497D 0%, #2E75B6 50%, #4A90C4 100%);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 2px 12px rgba(31,73,125,.25)}
    .header-brand{display:flex;align-items:stretch;gap:10px}
    .header-accent{width:3px;border-radius:3px;background:rgba(255,255,255,0.4);flex-shrink:0}
    .header-brand-text{display:flex;flex-direction:column;justify-content:center;gap:3px}
    .header-app-name{font-size:10px;font-weight:500;opacity:.6;letter-spacing:.08em;text-transform:uppercase}
    .header-page-name{font-size:18px;font-weight:800;letter-spacing:.02em;line-height:1.1;text-shadow:0 1px 2px rgba(0,0,0,.15)}
    .header-user-name{font-size:11px;font-weight:600;opacity:.85;margin-top:1px}
    .hamburger{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:5px;flex-shrink:0}
    .hamburger:active{background:rgba(255,255,255,.2)}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .menu-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.15)}
    .menu-overlay.open{display:block}
    .menu-drawer{position:absolute;top:58px;right:8px;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.16);min-width:180px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
    .menu-drawer a,.menu-drawer button{display:block;width:100%;padding:15px 22px;font-size:14px;font-weight:600;color:var(--text);text-decoration:none;text-align:left;background:none;border:none;cursor:pointer;border-bottom:1px solid #f3f5f8;font-family:inherit;transition:background .1s}
    .menu-drawer a:last-child,.menu-drawer button:last-child{border-bottom:none}
    .menu-drawer a:hover,.menu-drawer button:hover{background:#f5f7fa}
    .menu-drawer a:active,.menu-drawer button:active{background:#edf0f5}
    .menu-drawer .menu-logout{color:#c0392b}
    .menu-link-wrap{display:flex;align-items:center;justify-content:space-between}
    .unread-badge{background:#e74c3c;color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
    .page-wrapper{width:100%;min-height:100vh}
    .menu-overlay-inner{max-width:390px;margin:0 auto;height:100%;position:relative}
    @media(min-width:480px){
      body{background:#c8d8e8;display:flex;justify-content:center;align-items:flex-start}
      .page-wrapper{max-width:390px;background:var(--bg);box-shadow:0 0 48px rgba(0,0,0,.18);min-height:100vh}
    }
    .container{padding:16px;max-width:480px;margin:0 auto}

    /* ── 残日数カード ── */
    .balance-card{background:linear-gradient(135deg,#2E75B6 0%,#1F497D 100%);color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:16px;text-align:center;box-shadow:var(--shadow)}
    .balance-number{font-size:48px;font-weight:900;line-height:1}
    .balance-unit{font-size:16px;font-weight:600;margin-left:4px}
    .balance-label{font-size:12px;opacity:.8;margin-bottom:8px}
    .balance-detail{display:flex;justify-content:center;gap:12px;margin-top:12px;font-size:10px;opacity:.85;flex-wrap:wrap}
    .balance-detail-item{display:flex;flex-direction:column;align-items:center;gap:2px}
    .balance-detail-val{font-size:15px;font-weight:700}
    .balance-carry-note{background:rgba(255,200,50,.18);border:1px solid rgba(255,200,50,.35);border-radius:8px;padding:8px 12px;margin-top:10px;font-size:11px;display:none;align-items:center;gap:6px}
    .balance-carry-note .carry-date{font-weight:800}

    /* ── カード共通 ── */
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 20px;margin-bottom:16px;border:1px solid rgba(0,0,0,.04)}
    .card-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:6px}

    /* ── フォーム ── */
    .form-group{margin-bottom:14px}
    .form-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;display:block}
    .form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .2s, box-shadow .2s}
    .form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.12)}
    .type-selector{display:flex;gap:8px}
    .type-btn{flex:1;padding:10px 8px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;color:var(--text)}
    .type-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .btn-submit{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg, #2E75B6 0%, #3a8ad4 100%);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .1s, box-shadow .15s;box-shadow:0 3px 12px rgba(46,117,182,.3)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}
    .btn-submit:active:not(:disabled){transform:scale(0.98)}

    /* ── 申請履歴 ── */
    .request-item{border-bottom:1px solid #f0f4f8;padding:12px 0}
    .request-item:last-child{border-bottom:none}
    .request-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .request-dates{font-size:14px;font-weight:700;color:var(--text)}
    .request-type{font-size:11px;color:var(--muted)}
    .request-meta{display:flex;align-items:center;gap:8px;margin-top:4px}
    .request-created{font-size:11px;color:var(--muted)}
    .request-reason{font-size:12px;color:var(--muted);margin-top:4px}
    .request-comment{font-size:12px;color:var(--text);margin-top:4px;padding:6px 10px;background:#f8f9fb;border-radius:8px}

    .status-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
    .status-pending{background:#fef3c7;color:#9a3412}
    .status-approved{background:#dcfce7;color:#166534}
    .status-rejected{background:#fee2e2;color:#b91c1c}
    .status-cancelled{background:#f0f0f0;color:#6b7a99}

    .btn-cancel{padding:5px 10px;border:1px solid var(--danger);border-radius:8px;background:#fff;color:var(--danger);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-cancel:active{background:#fee2e2}

    /* ── 付与情報カード ── */
    .info-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px;border:1px solid rgba(0,0,0,.04)}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f4f8}
    .info-row:last-child{border-bottom:none}
    .info-label{font-size:12px;color:var(--muted);font-weight:600}
    .info-value{font-size:14px;font-weight:700;color:var(--text)}
    .info-countdown{display:flex;align-items:center;gap:6px}
    .countdown-num{font-size:22px;font-weight:900;color:var(--blue)}
    .countdown-unit{font-size:12px;color:var(--muted)}
    .countdown-sub{font-size:11px;color:var(--muted)}
    .celebration-badge{display:inline-block;background:#fff3cd;color:#856404;border:1px solid #ffc107;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
    .celebration-expired{background:#f0f0f0;color:#6b7a99;border-color:#d0d7e3}

    .empty-msg{text-align:center;color:var(--muted);font-size:14px;padding:24px 0}
    .spinner{text-align:center;color:var(--muted);font-size:13px;padding:30px 0}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="page-wrapper">
<header>
  <div class="header-brand">
    <div class="header-accent"></div>
    <div class="header-brand-text">
      <span class="header-app-name">にこっと Web App</span>
      <span class="header-page-name">有給管理</span>
      <span class="header-user-name" id="headerUserName"></span>
    </div>
  </div>
  <button class="hamburger" id="hamburgerBtn" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-overlay-inner">
    <div class="menu-drawer" id="menuDrawer">
      <a href="/">入力画面</a>
      <a href="/history">月次実績</a>
      <a href="/notices"><span class="menu-link-wrap">お知らせ<span class="unread-badge" id="menuBadge" style="display:none"></span></span></a>
      <a href="/change-password">PW変更</a>
      <a href="/manual">使い方</a>
      <button class="menu-logout" id="menuLogoutBtn">ログアウト</button>
    </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="spinner" id="spinner">読み込み中...</div>

  <!-- 残日数カード -->
  <div class="balance-card" id="balanceCard" style="display:none">
    <div class="balance-label">有給残日数</div>
    <div><span class="balance-number" id="balanceNum">-</span><span class="balance-unit">日</span></div>
    <div class="balance-detail">
      <div class="balance-detail-item"><span>年間付与</span><span class="balance-detail-val" id="balGranted">-</span></div>
      <div class="balance-detail-item"><span>前年繰越</span><span class="balance-detail-val" id="balCarried">-</span></div>
      <div class="balance-detail-item" id="balOcRow" style="display:none"><span>OC付与</span><span class="balance-detail-val" id="balOc">-</span></div>
      <div class="balance-detail-item"><span>使用済</span><span class="balance-detail-val" id="balUsed">-</span></div>
    </div>
    <div class="balance-carry-note" id="carryNote"><span>⏳</span><span>前年繰越 <span id="carryDays">-</span>日 は <span class="carry-date" id="carryExpiry">-</span> に期限切れ</span></div>
    <div class="balance-carry-note" id="celebNote" style="display:none"><span>🎉</span><span>お祝い休暇 <span class="carry-date" id="celebStatus">-</span></span></div>
  </div>

  <!-- 付与情報カード -->
  <div class="info-card" id="infoCard" style="display:none">
    <div class="info-row">
      <span class="info-label">入職日</span>
      <span class="info-value" id="infoHireDate">-</span>
    </div>
    <div class="info-row" id="infoCelebrationRow" style="display:none">
      <span class="info-label">お祝い休暇（3日）</span>
      <span class="info-value" id="infoCelebration">-</span>
    </div>
    <div class="info-row" id="infoNextGrantRow">
      <span class="info-label">次回有給付与</span>
      <div style="text-align:right">
        <div class="info-countdown">
          <span class="countdown-num" id="infoCountdown">-</span>
          <span class="countdown-unit">日後</span>
        </div>
        <div class="countdown-sub" id="infoNextDetail">-</div>
      </div>
    </div>
  </div>

  <!-- 申請フォーム -->
  <div class="card" id="formCard" style="display:none">
    <div class="card-title">有給申請</div>
    <div class="form-group">
      <label class="form-label">種別</label>
      <div class="type-selector">
        <button class="type-btn active" data-type="full">全日</button>
        <button class="type-btn" data-type="half_am">午前半休</button>
        <button class="type-btn" data-type="half_pm">午後半休</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">開始日</label>
      <input type="date" class="form-input" id="startDate">
    </div>
    <div class="form-group" id="endDateGroup">
      <label class="form-label">終了日（複数日の場合）</label>
      <input type="date" class="form-input" id="endDate">
    </div>
    <div class="form-group">
      <label class="form-label">理由（任意）</label>
      <input type="text" class="form-input" id="reason" placeholder="例: 私用、通院 等">
    </div>
    <button class="btn-submit" id="submitBtn">申請する</button>
  </div>

  <!-- 申請履歴 -->
  <div class="card" id="historyCard" style="display:none">
    <div class="card-title">申請履歴</div>
    <div id="requestsList"></div>
    <div class="empty-msg" id="emptyMsg" style="display:none">申請履歴はありません</div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="/vendor/api-fetch.js"></script>
<script src="/vendor/common.js"></script>
<script>
  let selectedType = 'full';
  let currentBalance = 0;

  async function init() {
    const me = await fetch('/api/me').then(r => r.json());
    if (!me.id) { location.href = '/login'; return; }

    const elUser = document.getElementById('headerUserName');
    if (elUser) elUser.textContent = `👤 ${me.name}（${me.type === 'nurse' ? '看護師' : me.type === 'office' ? '事務' : me.type}）`;

    // 事務は入力画面・月次実績メニューを非表示
    if (me.type === 'office') {
      const drawer = document.getElementById('menuDrawer');
      ['a[href="/"]', 'a[href="/history"]'].forEach(sel => {
        const el = drawer.querySelector(sel);
        if (el) el.style.display = 'none';
      });
    }

    if (me.leave_oncall_enabled) {
      const drawer = document.getElementById('menuDrawer');
      const historyLink = drawer.querySelector('a[href="/history"]');
      if (historyLink) {
        const leaveLink = document.createElement('a');
        leaveLink.href = '/leave';
        leaveLink.textContent = '有給管理';
        historyLink.after(leaveLink);
        if (me.oncall_eligible) {
          const oncallLink = document.createElement('a');
          oncallLink.href = '/oncall';
          oncallLink.textContent = 'オンコール';
          leaveLink.after(oncallLink);
        }
      }
    }

    // 明日以降の日付をデフォルトに
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const tomorrowStr = tomorrow.toISOString().slice(0, 10);
    document.getElementById('startDate').min = tomorrowStr;
    document.getElementById('endDate').min = tomorrowStr;
    document.getElementById('startDate').value = tomorrowStr;

    document.getElementById('spinner').style.display = 'none';
    await Promise.all([loadBalance(), loadRequests()]);
    document.getElementById('balanceCard').style.display = '';
    document.getElementById('infoCard').style.display = '';
    document.getElementById('formCard').style.display = '';
    document.getElementById('historyCard').style.display = '';
  }

  async function loadBalance() {
    const res = await fetch('/api/leave/balance');
    const data = await res.json();
    currentBalance = data.balance;
    document.getElementById('balanceNum').textContent = data.balance;
    document.getElementById('balGranted').textContent = data.granted + '日';
    document.getElementById('balCarried').textContent = data.carried_over + '日';
    // お祝い休暇（入職半年以内のみ表示）
    const celebDays = data.celebration_days || 0;
    const celebUsed = data.celebration_used || 0;
    const celebRemain = celebDays - celebUsed;
    if (data.next_grant && data.next_grant.celebration_active && celebDays > 0) {
      document.getElementById('celebNote').style.display = 'flex';
      document.getElementById('celebStatus').textContent = celebRemain > 0
        ? '残り ' + celebRemain + '日 / ' + celebDays + '日（有給から自動消化）'
        : '使用済（' + celebDays + '日）';
    }
    const oncall = data.oncall_leave || 0;
    if (oncall > 0) {
      document.getElementById('balOcRow').style.display = '';
      document.getElementById('balOc').textContent = oncall + '日';
    }
    document.getElementById('balUsed').textContent = data.used + '日';

    // 繰越期限表示
    if (data.carried_over > 0 && data.grant_date) {
      const gd = new Date(data.grant_date);
      gd.setFullYear(gd.getFullYear() + 1);
      gd.setDate(gd.getDate() - 1);
      const expiryStr = gd.getFullYear() + '年' + (gd.getMonth()+1) + '月' + gd.getDate() + '日';
      document.getElementById('carryDays').textContent = data.carried_over;
      document.getElementById('carryExpiry').textContent = expiryStr;
      document.getElementById('carryNote').style.display = 'flex';
    }

    // 付与情報カード
    if (data.hire_date) {
      document.getElementById('infoHireDate').textContent = formatDateFull(data.hire_date);
    } else {
      document.getElementById('infoHireDate').textContent = '未設定';
    }

    // お祝い休暇の残日数
    const celebrationDays = data.celebration_days || 0;
    const celebrationUsed = data.celebration_used || 0;
    const celebrationRemaining = celebrationDays - celebrationUsed;

    const ng = data.next_grant;
    if (ng) {
      // お祝い休暇（入職半年以内のみ表示）
      const celRow = document.getElementById('infoCelebrationRow');
      if (ng.celebration_active) {
        celRow.style.display = '';
        document.querySelector('#infoCelebrationRow .info-label').textContent =
          'お祝い休暇（' + celebrationDays + '日）';
        if (celebrationRemaining > 0) {
          document.getElementById('infoCelebration').innerHTML =
            '<span class="celebration-badge">残り ' + celebrationRemaining + '日 / ' + celebrationDays + '日</span>' +
            '<div style="font-size:11px;color:var(--muted);margin-top:2px">期限: ' + formatDateFull(ng.celebration_expiry) + '</div>';
        } else {
          document.getElementById('infoCelebration').innerHTML =
            '<span class="celebration-badge celebration-expired">使用済</span>';
        }
      }

      // 次回付与
      document.getElementById('infoCountdown').textContent = ng.days_until_next;
      document.getElementById('infoNextDetail').textContent =
        formatDateFull(ng.next_grant_date) + ' に ' + ng.next_grant_days + '日 付与';
    } else {
      document.getElementById('infoNextGrantRow').style.display = 'none';
      document.getElementById('infoCelebrationRow').style.display = 'none';
    }
  }

  function formatDateFull(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return y + '年' + Number(m) + '月' + Number(d) + '日';
  }

  async function loadRequests() {
    const res = await fetch('/api/leave/requests');
    const { requests } = await res.json();
    const list = document.getElementById('requestsList');
    const emptyMsg = document.getElementById('emptyMsg');

    if (!requests.length) {
      list.innerHTML = '';
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';

    list.innerHTML = requests.map(r => {
      const dateStr = r.dates.length === 1
        ? formatDate(r.dates[0])
        : formatDate(r.dates[0]) + '〜' + formatDate(r.dates[r.dates.length - 1]);
      const typeLabel = r.type === 'full' ? '全日' : r.type === 'half_am' ? '午前半休' : '午後半休';
      const statusLabel = { pending: '承認待ち', approved: '承認済', rejected: '却下', cancelled: '取消済' }[r.status];
      const dayCount = r.type === 'full' ? r.dates.length : r.dates.length * 0.5;
      const canCancel = r.status === 'pending' || r.status === 'approved';

      return `
        <div class="request-item">
          <div class="request-header">
            <div>
              <div class="request-dates">${dateStr}</div>
              <div class="request-type">${typeLabel}（${dayCount}日）</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="status-badge status-${r.status}">${statusLabel}</span>
              ${canCancel ? `<button class="btn-cancel" data-action="cancel-request" data-id="${esc(r.id)}">取消</button>` : ''}
            </div>
          </div>
          ${r.reason ? `<div class="request-reason">理由: ${esc(r.reason)}</div>` : ''}
          ${r.adminComment ? `<div class="request-comment">コメント: ${esc(r.adminComment)}</div>` : ''}
          <div class="request-meta">
            <span class="request-created">申請日: ${formatDateTime(r.createdAt)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function selectType(btn) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.type;
    // 半休の場合は終了日を非表示
    document.getElementById('endDateGroup').style.display =
      selectedType === 'full' ? '' : 'none';
  }

  async function submitRequest() {
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const reason = document.getElementById('reason').value;

    if (!startDate) { showToast('開始日を選択してください'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    try {
      const body = { type: selectedType, startDate, reason };
      if (selectedType === 'full' && endDate) body.endDate = endDate;

      const res = await apiFetch('/api/leave/requests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'エラーが発生しました'); return; }

      showToast('申請しました');
      document.getElementById('reason').value = '';
      await Promise.all([loadBalance(), loadRequests()]);
    } catch (e) {
      showToast('エラーが発生しました');
    } finally {
      btn.disabled = false;
    }
  }

  // ── #requestsList イベント委譲 ──────────────────────────────────
  document.getElementById('requestsList').addEventListener('click', e => {
    const btn = e.target.closest('[data-action="cancel-request"]');
    if (btn) cancelRequest(btn.dataset.id);
  });

  async function cancelRequest(id) {
    if (!confirm('この申請を取り消しますか？')) return;
    try {
      const res = await apiFetch(`/api/leave/requests/${id}/cancel`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'エラーが発生しました'); return; }
      showToast('取り消しました');
      await Promise.all([loadBalance(), loadRequests()]);
    } catch {
      showToast('エラーが発生しました');
    }
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${Number(m)}/${Number(d)}`;
  }

  function formatDateTime(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  initCommonUI();

  // 種別ボタン（event delegation on parent .type-selector）
  document.querySelector('.type-selector').addEventListener('click', function(e) {
    const btn = e.target.closest('.type-btn');
    if (btn) selectType(btn);
  });

  document.getElementById('submitBtn').addEventListener('click', submitRequest);

  init();
</script>
</body>
</html>
