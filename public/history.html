<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>月次実績 | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#2E75B6;--blue-dark:#1F497D;
      --bg:#f0f4f8;--white:#fff;--border:#d0d7e3;--text:#1a2233;--muted:#6b7a99;
      --kaigo:#1e40af;--kaigo-bg:#dbeafe;--iryo:#9a3412;--iryo-bg:#fef3c7;
      --ok:#0a7c42;--ok-bg:#e6f7ef;
      --radius:14px;--shadow:0 2px 16px rgba(0,0,0,.10)
    }
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
    header{background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .header-left{display:flex;flex-direction:column;gap:2px;min-width:0}
    .header-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .header-type{font-size:11px;opacity:.75}
    .header-nav{display:flex;gap:8px;align-items:center;flex-shrink:0}
    .header-nav a{color:#fff;font-size:12px;text-decoration:none;border:1px solid rgba(255,255,255,.5);padding:4px 9px;border-radius:6px;white-space:nowrap}
    .logout-btn{background:transparent;border:1px solid rgba(255,255,255,.5);color:#fff;font-size:12px;padding:4px 9px;border-radius:6px;cursor:pointer;white-space:nowrap}
    .container{padding:16px}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 18px;margin-bottom:14px}
    .card-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px}
    .section-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
    /* セレクト */
    .select-wrap{position:relative}
    .select-wrap select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;font-family:inherit;color:var(--text);background:var(--white);outline:none;-webkit-appearance:none;appearance:none}
    .select-wrap select:focus{border-color:var(--blue)}
    .select-wrap::after{content:"▼";position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:11px}
    /* 統計カード */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stat-box{border-radius:10px;padding:12px 14px}
    .stat-box.kaigo-box{background:var(--kaigo-bg)}
    .stat-box.iryo-box{background:var(--iryo-bg)}
    .stat-box.total-box{background:#f0fdf4}
    .stat-box.units-box{background:#f0fdf4}
    .stat-box.days-box{background:var(--bg)}
    .stat-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px}
    .stat-val{font-size:20px;font-weight:800;color:var(--text)}
    .stat-unit{font-size:12px;color:var(--muted);margin-left:2px}
    /* インセンティブ */
    .incentive-goal{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px}
    .incentive-hit{background:#fee2e2;color:#b91c1c;border-radius:9px;padding:12px 16px;font-size:14px;font-weight:700;text-align:center}
    .incentive-ok{background:#f0f0f0;color:var(--muted);border-radius:9px;padding:12px 16px;font-size:14px;font-weight:600;text-align:center}
    /* テーブル */
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{background:#f8faff;color:var(--blue-dark);padding:8px 10px;text-align:center;font-size:12px;font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap}
    td{padding:8px 8px;border-bottom:1px solid #f0f4f8;text-align:center;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .date-cell{text-align:left;white-space:nowrap;font-weight:600;font-size:13px}
    .sat{color:#1e40af}
    .sun{color:#c0392b}
    .future-row td{color:#bbc5d4}
    .no-data-row td{color:#c8d0de}
    /* バッジ */
    .badge-kaigo{background:var(--kaigo-bg);color:var(--kaigo);padding:2px 6px;border-radius:10px;font-size:10px;font-weight:700}
    .badge-iryo{background:var(--iryo-bg);color:var(--iryo);padding:2px 6px;border-radius:10px;font-size:10px;font-weight:700}
    /* 修正ボタン */
    .btn-edit{padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
    .btn-edit.active{background:var(--blue);color:#fff}
    .btn-edit.disabled{background:#e8edf5;color:#aab2c4;cursor:default}
    /* 注意バナー */
    .prev-notice{background:#f0f4f8;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);margin-bottom:12px}
    /* ローディング */
    .loading{text-align:center;padding:32px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-name" id="headerName">読み込み中...</div>
    <div class="header-type" id="headerType"></div>
  </div>
  <nav class="header-nav">
    <a href="/">入力</a>
    <a href="/change-password">PW変更</a>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </nav>
</header>

<div id="mainContent" class="container" style="display:none">

  <!-- 月選択 -->
  <div class="card">
    <div class="card-title">📅 月を選択</div>
    <div class="select-wrap">
      <select id="monthSelect" onchange="loadHistory()"></select>
    </div>
  </div>

  <div id="loadingView" class="loading" style="display:none">集計中...</div>

  <!-- 統計カード -->
  <div class="card" id="statsSection" style="display:none">
    <div class="section-title" id="statsTitle">月の実績</div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <!-- インセンティブ -->
  <div class="card" id="incentiveSection" style="display:none">
    <div class="section-title">インセンティブ</div>
    <p class="incentive-goal" id="incentiveGoalLine"></p>
    <div id="incentiveMsg"></div>
  </div>

  <!-- 日別明細 -->
  <div class="card" id="tableSection" style="display:none">
    <div class="section-title">日別明細</div>
    <div class="prev-notice" id="prevNotice" style="display:none">
      ※ 前月以前のデータは修正できません
    </div>
    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const WEEKDAYS = ['日','月','火','水','木','金','土'];
  let currentUser = null;

  async function init() {
    const res = await fetch('/api/me');
    if (!res.ok) { location.href = '/login'; return; }
    currentUser = await res.json();
    document.getElementById('headerName').textContent = currentUser.name;
    document.getElementById('headerType').textContent =
      currentUser.type === 'nurse' ? '看護師' : 'リハビリ';
    buildMonthSelector();
    document.getElementById('mainContent').style.display = 'block';
    loadHistory();
  }

  function buildMonthSelector() {
    const sel = document.getElementById('monthSelect');
    const now = new Date();
    const cy = now.getFullYear(), cm = now.getMonth() + 1;
    for (let i = 0; i <= 12; i++) {
      let m = cm - i, y = cy;
      while (m <= 0) { m += 12; y--; }
      const opt = document.createElement('option');
      opt.value = `${y}-${m}`;
      opt.textContent = i === 0 ? `${y}年${m}月（当月）` : `${y}年${m}月`;
      sel.appendChild(opt);
    }
  }

  async function loadHistory() {
    const [year, month] = document.getElementById('monthSelect').value.split('-').map(Number);
    document.getElementById('loadingView').style.display = 'block';
    document.getElementById('statsSection').style.display   = 'none';
    document.getElementById('incentiveSection').style.display = 'none';
    document.getElementById('tableSection').style.display   = 'none';

    try {
      const res = await fetch(`/api/monthly-detail?year=${year}&month=${month}`);
      if (!res.ok) throw new Error((await res.json()).error);
      const data = await res.json();
      renderStats(data);
      renderIncentive(data);
      renderTable(data);
      document.getElementById('loadingView').style.display   = 'none';
      document.getElementById('statsSection').style.display   = 'block';
      document.getElementById('incentiveSection').style.display = 'block';
      document.getElementById('tableSection').style.display   = 'block';
    } catch (e) {
      document.getElementById('loadingView').textContent = '読み込みに失敗しました: ' + e.message;
    }
  }

  function renderStats(data) {
    document.getElementById('statsTitle').textContent = `${data.month}月の実績`;
    const grid = document.getElementById('statsGrid');
    const s = data.stats;
    if (data.type === 'nurse') {
      grid.innerHTML = `
        <div class="stat-box kaigo-box">
          <div class="stat-label"><span class="badge-kaigo">介護</span> 合計</div>
          <div class="stat-val">${(s.total_kaigo||0).toFixed(1)}<span class="stat-unit">時間</span></div>
        </div>
        <div class="stat-box iryo-box">
          <div class="stat-label"><span class="badge-iryo">医療</span> 合計</div>
          <div class="stat-val">${(s.total_iryo||0).toFixed(1)}<span class="stat-unit">時間</span></div>
        </div>
        <div class="stat-box total-box">
          <div class="stat-label">合計時間</div>
          <div class="stat-val" style="color:var(--ok)">${(s.total||0).toFixed(1)}<span class="stat-unit">時間</span></div>
        </div>
        <div class="stat-box days-box">
          <div class="stat-label">稼働日数</div>
          <div class="stat-val">${s.working_days||0}<span class="stat-unit">日</span></div>
        </div>`;
    } else {
      grid.innerHTML = `
        <div class="stat-box units-box">
          <div class="stat-label">合計単位数</div>
          <div class="stat-val" style="color:var(--ok)">${s.total_units||0}<span class="stat-unit">単位</span></div>
        </div>
        <div class="stat-box days-box">
          <div class="stat-label">稼働日数</div>
          <div class="stat-val">${s.working_days||0}<span class="stat-unit">日</span></div>
        </div>`;
    }
  }

  function renderIncentive(data) {
    const s = data.stats;
    if (s.incentive_line == null || (s.working_days || 0) === 0) {
      document.getElementById('incentiveSection').style.display = 'none';
      return;
    }
    const line = s.incentive_line, days = s.working_days;
    if (data.type === 'nurse') {
      const target = (line * days).toFixed(1);
      const actual = (s.total || 0).toFixed(1);
      document.getElementById('incentiveGoalLine').textContent = `目標：${target}時間　／　実績：${actual}時間`;
    } else {
      const target = Math.round(line * days * 100) / 100;
      const actual = s.total_units || 0;
      document.getElementById('incentiveGoalLine').textContent = `目標：${target}単位　／　実績：${actual}単位`;
    }
    const msg = document.getElementById('incentiveMsg');
    msg.innerHTML = s.incentive_triggered
      ? '<div class="incentive-hit">お疲れ様です。インセンティブが発生しています！</div>'
      : '<div class="incentive-ok">入力ありがとうございます。お疲れ様でした。</div>';
  }

  function renderTable(data) {
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const isCurrentMonth = data.year === now.getFullYear() && data.month === now.getMonth() + 1;

    document.getElementById('prevNotice').style.display = isCurrentMonth ? 'none' : 'block';

    const head = document.getElementById('tableHead');
    const body = document.getElementById('tableBody');
    body.innerHTML = '';

    if (data.type === 'nurse') {
      head.innerHTML = '<tr><th>日付</th><th><span class="badge-kaigo">介護</span></th><th><span class="badge-iryo">医療</span></th><th>合計</th><th></th></tr>';
      for (const d of data.days) {
        const dateStr = `${data.year}-${String(data.month).padStart(2,'0')}-${String(d.day).padStart(2,'0')}`;
        const isFuture = dateStr > todayStr;
        const hasData  = d.kaigo != null || d.iryo != null;
        const wdClass  = d.weekday === '土' ? 'sat' : d.weekday === '日' ? 'sun' : '';
        const trClass  = isFuture ? 'future-row' : (!hasData ? 'no-data-row' : '');
        const editBtn  = isCurrentMonth && !isFuture
          ? `<button class="btn-edit active" onclick="editDate('${dateStr}')">修正</button>`
          : `<button class="btn-edit disabled" disabled>修正</button>`;
        const tr = document.createElement('tr');
        if (trClass) tr.className = trClass;
        tr.innerHTML = `
          <td class="date-cell"><span class="${wdClass}">${data.month}/${d.day}（${d.weekday}）</span></td>
          <td>${d.kaigo != null ? d.kaigo.toFixed(1) : '—'}</td>
          <td>${d.iryo  != null ? d.iryo.toFixed(1)  : '—'}</td>
          <td>${d.total != null ? d.total.toFixed(1) : '—'}</td>
          <td>${editBtn}</td>`;
        body.appendChild(tr);
      }
    } else {
      head.innerHTML = '<tr><th>日付</th><th>単位数</th><th></th></tr>';
      for (const d of data.days) {
        const dateStr = `${data.year}-${String(data.month).padStart(2,'0')}-${String(d.day).padStart(2,'0')}`;
        const isFuture = dateStr > todayStr;
        const wdClass  = d.weekday === '土' ? 'sat' : d.weekday === '日' ? 'sun' : '';
        const trClass  = isFuture ? 'future-row' : (d.value == null ? 'no-data-row' : '');
        const editBtn  = isCurrentMonth && !isFuture
          ? `<button class="btn-edit active" onclick="editDate('${dateStr}')">修正</button>`
          : `<button class="btn-edit disabled" disabled>修正</button>`;
        const tr = document.createElement('tr');
        if (trClass) tr.className = trClass;
        tr.innerHTML = `
          <td class="date-cell"><span class="${wdClass}">${data.month}/${d.day}（${d.weekday}）</span></td>
          <td>${d.value != null ? d.value : '—'}</td>
          <td>${editBtn}</td>`;
        body.appendChild(tr);
      }
    }
  }

  function editDate(dateStr) {
    location.href = `/?date=${dateStr}`;
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    location.href = '/login';
  }

  init();
</script>
</body>
</html>
