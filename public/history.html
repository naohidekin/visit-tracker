<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月次実績 | にこっと訪問看護ステーション</title>
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/utilities.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#2E75B6;--blue-dark:#1F497D;
      --bg:#f0f4f8;--white:#fff;--border:#dce3ed;--text:#1a2233;--muted:#6b7a99;
      --kaigo:#1e40af;--kaigo-bg:#dbeafe;--iryo:#9a3412;--iryo-bg:#fef3c7;
      --ok:#0a7c42;--ok-bg:#e6f7ef;
      --radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.08)
    }
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}
    header{background:linear-gradient(135deg, #1F497D 0%, #2E75B6 50%, #4A90C4 100%);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 2px 12px rgba(31,73,125,.25)}
    .header-brand{display:flex;align-items:stretch;gap:10px}
    .header-accent{width:3px;border-radius:3px;background:rgba(255,255,255,0.4);flex-shrink:0}
    .header-brand-text{display:flex;flex-direction:column;justify-content:center;gap:3px}
    .header-app-name{font-size:10px;font-weight:500;opacity:.6;letter-spacing:.08em;text-transform:uppercase}
    .header-page-name{font-size:18px;font-weight:800;letter-spacing:.02em;line-height:1.1;text-shadow:0 1px 2px rgba(0,0,0,.15)}
    .header-user-name{font-size:11px;font-weight:600;opacity:.85;margin-top:1px}
    .hamburger{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:5px;flex-shrink:0}
    .hamburger:active{background:rgba(255,255,255,.2)}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .menu-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.15)}
    .menu-overlay.open{display:block}
    .menu-drawer{position:absolute;top:58px;right:8px;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.16);min-width:180px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
    .menu-drawer a,.menu-drawer button{display:block;width:100%;padding:15px 22px;font-size:14px;font-weight:600;color:var(--text);text-decoration:none;text-align:left;background:none;border:none;cursor:pointer;border-bottom:1px solid #f3f5f8;font-family:inherit;transition:background .1s}
    .menu-drawer a:last-child,.menu-drawer button:last-child{border-bottom:none}
    .menu-drawer a:hover,.menu-drawer button:hover{background:#f5f7fa}
    .menu-drawer a:active,.menu-drawer button:active{background:#edf0f5}
    .menu-drawer .menu-logout{color:#c0392b}
    /* ── PC: スマホ幅中央固定 ── */
    .page-wrapper{width:100%;min-height:100vh}
    .menu-overlay-inner{max-width:390px;margin:0 auto;height:100%;position:relative}
    @media(min-width:480px){
      body{background:#c8d8e8;display:flex;justify-content:center;align-items:flex-start}
      .page-wrapper{max-width:390px;background:var(--bg);box-shadow:0 0 48px rgba(0,0,0,.18);min-height:100vh}
    }
    .container{padding:16px;max-width:480px;margin:0 auto}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 20px;margin-bottom:16px;border:1px solid rgba(0,0,0,.04)}
    .card-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px}
    .section-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
    /* セレクト */
    .select-wrap{position:relative}
    .select-wrap select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:9px;font-size:15px;font-family:inherit;color:var(--text);background:var(--white);outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s, box-shadow .2s}
    .select-wrap select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.12)}
    .select-wrap::after{content:"▼";position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:11px}
    /* 統計カード */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stat-box{border-radius:10px;padding:12px 14px}
    .stat-box.kaigo-box{background:var(--kaigo-bg)}
    .stat-box.iryo-box{background:var(--iryo-bg)}
    .stat-box.total-box{background:#f0fdf4}
    .stat-box.units-box{background:#f0fdf4}
    .stat-box.days-box{background:var(--bg)}
    .stat-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px}
    .stat-val{font-size:20px;font-weight:800;color:var(--text)}
    .stat-unit{font-size:12px;color:var(--muted);margin-left:2px}
    /* ── 統合実績カード ── */
    .result-card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 20px;margin-bottom:16px;border:1px solid rgba(0,0,0,.04)}
    .result-goal-line{font-size:13px;font-weight:600;color:var(--muted);text-align:center;margin-bottom:16px}
    .result-big-total{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:6px}
    .result-big-label{font-size:13px;font-weight:600;color:var(--muted)}
    .result-card.incentive .result-big-label{color:#A32D2D}
    .result-big-num{font-size:36px;font-weight:800;color:var(--text)}
    .result-card.incentive .result-big-num{color:#E24B4A}
    .result-incentive-msg{font-size:15px;font-weight:700;color:#E24B4A;text-align:center;margin-bottom:4px}
    .result-diff-line{font-size:13px;font-weight:600;text-align:center;margin-bottom:8px}
    .result-diff-line.remain{color:var(--muted)}
    .result-diff-line.reached{color:#16a34a;font-weight:700;font-size:14px}
    .result-incentive-amount{font-size:13px;color:#555;text-align:center;margin-bottom:8px;background:#fff8e1;border-radius:6px;padding:6px 12px;border:1px solid #ffe082}
    .result-incentive-amount strong{font-size:17px;color:#E24B4A;font-weight:800}
    .result-sub-grid{display:grid;gap:8px;margin-top:14px}
    .result-sub-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
    .result-sub-grid.cols-2{grid-template-columns:1fr 1fr}
    .result-sub-box{background:#fff;border-radius:10px;padding:10px 8px;text-align:center}
    .result-sub-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px}
    .result-sub-val{font-size:18px;font-weight:800;color:var(--text)}
    .result-sub-unit{font-size:12px;color:var(--muted);margin-left:2px}
    /* テーブル */
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{background:#f8faff;color:var(--blue-dark);padding:8px 10px;text-align:center;font-size:12px;font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap}
    td{padding:8px 8px;border-bottom:1px solid #f0f4f8;text-align:center;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .date-cell{text-align:left;white-space:nowrap;font-weight:600;font-size:13px}
    .sat{color:#1e40af}
    .sun{color:#c0392b}
    .future-row td{color:#bbc5d4}
    .no-data-row td{color:#c8d0de}
    /* バッジ */
    .badge-kaigo{background:var(--kaigo-bg);color:var(--kaigo);padding:2px 6px;border-radius:10px;font-size:10px;font-weight:700}
    .badge-iryo{background:var(--iryo-bg);color:var(--iryo);padding:2px 6px;border-radius:10px;font-size:10px;font-weight:700}
    /* 修正ボタン */
    .btn-edit{padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
    .btn-edit.active{background:var(--blue);color:#fff}
    .btn-edit.disabled{background:#e8edf5;color:#aab2c4;cursor:default}
    /* 注意バナー */
    .prev-notice{background:#f0f4f8;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);margin-bottom:12px}
    /* 締済バッジ */
    .closed-label{font-size:11px;font-weight:700;color:#aab2c4;background:#e8edf5;border-radius:5px;padding:3px 8px;white-space:nowrap}
    /* ローディング */
    .loading{text-align:center;padding:32px;color:var(--muted);font-size:13px}
    .copyright{font-size:11px;color:#b0b8cc;text-align:center;padding:20px 16px;letter-spacing:.02em}
    /* グラフカード */
    .chart-container{position:relative;width:100%;height:220px}
    /* インセンティブ見込カード */
    .incentive-card{background:linear-gradient(135deg,#fffbeb 0%,#fef3c7 100%);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:14px;border:1.5px solid #fbbf24}
    .incentive-card-header{display:flex;align-items:center;gap:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .incentive-card-title{font-size:13px;font-weight:800;color:#92400e;white-space:nowrap}
    .incentive-card-period{font-size:11px;color:#a16207;white-space:nowrap}
    .incentive-toggle{font-size:11px;color:#a16207;margin-left:auto;flex-shrink:0}
    .incentive-card-body{overflow:hidden;transition:max-height .25s ease,opacity .2s ease;max-height:200px;opacity:1}
    .incentive-card-body.collapsed{max-height:0;opacity:0;margin:0;padding:0}
    .incentive-amount-box{display:flex;align-items:baseline;justify-content:center;gap:8px;padding:4px 0}
    .incentive-amount-label{font-size:11px;font-weight:700;color:#92400e}
    .incentive-amount-val{font-size:26px;font-weight:900;color:#dc2626}
    .incentive-detail{font-size:12px;color:#78350f;text-align:center;margin-top:2px}
    .incentive-not-reached{text-align:center;padding:4px 0}
    .incentive-not-reached-msg{font-size:13px;font-weight:700;color:#92400e;margin-bottom:2px}
    .incentive-not-reached-remain{font-size:12px;color:#a16207}
    .incentive-note{font-size:10px;color:#a16207;text-align:center;margin-top:6px;padding-top:6px;border-top:1px dashed #e5b94e}
    .collapsible-body{overflow:hidden;transition:max-height .25s ease,opacity .2s ease;max-height:300px;opacity:1}
    .collapsible-body.collapsed{max-height:0;opacity:0}
    .menu-link-wrap{display:flex;align-items:center;justify-content:space-between}
    .unread-badge{background:#e74c3c;color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 5px}
    .hist-mode-toggle{display:flex;gap:0;margin-top:10px}
    .chart-toggle-wrap{cursor:pointer;display:flex;align-items:center;justify-content:space-between;-webkit-tap-highlight-color:transparent}
    .chart-arrow{font-size:11px;color:var(--muted)}
  </style>
  <script src="/vendor/chart.umd.js"></script>
  <script src="/vendor/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
<div class="page-wrapper">

<header>
  <div class="header-brand">
    <div class="header-accent"></div>
    <div class="header-brand-text">
      <span class="header-app-name">にこっと Web App</span>
      <span class="header-page-name">月次実績</span>
      <span class="header-user-name" id="headerUserName"></span>
    </div>
  </div>
  <button class="hamburger" id="hamburgerBtn" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-overlay-inner">
    <div class="menu-drawer" id="menuDrawer">
      <a href="/">入力画面</a>
      <a href="/history">月次実績</a>
      <a href="/notices"><span class="menu-link-wrap">お知らせ<span class="unread-badge" id="menuBadge"></span></span></a>
      <a href="/change-password">PW変更</a>
      <a href="/manual">使い方</a>
      <button class="menu-logout" id="menuLogoutBtn">ログアウト</button>
    </div>
    </div>
  </div>
</header>

<div id="mainContent" class="container d-none">

  <!-- 月選択 -->
  <div class="card">
    <div class="card-title">📅 月を選択</div>
    <div class="select-wrap">
      <select id="monthSelect"></select>
    </div>
    <div class="hist-mode-toggle" id="histModeToggle">
      <button id="histModeBilling" type="button" class="tab-active">締め期間</button>
      <button id="histModeMonthly" type="button" class="tab-inactive">月次</button>
    </div>
  </div>

  <div id="loadingView" class="loading d-none">集計中...</div>

  <!-- 月次実績カード -->
  <div id="statsCardSection" class="d-none">
    <div id="statsCard"></div>
  </div>

  <!-- インセンティブ見込カード -->
  <div id="incentiveSection" class="d-none">
    <div id="incentiveCard"></div>
  </div>

  <!-- 月次グラフ -->
  <div class="card d-none" id="chartSection">
    <div class="section-title chart-toggle-wrap" id="chartToggle">
      📊 日別訪問グラフ
      <span id="chartArrow" class="chart-arrow">▼</span>
    </div>
    <div id="chartBody" class="collapsible-body collapsed">
      <div class="chart-container">
        <canvas id="visitChart"></canvas>
      </div>
    </div>
  </div>

  <!-- 日別明細 -->
  <div class="card d-none" id="tableSection">
    <div class="section-title">日別明細</div>
    <div class="prev-notice d-none" id="prevNotice">
      ※ 締日（15日）以前の行は修正できません（締済）
    </div>
    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="/vendor/api-fetch.js"></script>
<script src="/vendor/common.js"></script>
<script>
  initCommonUI();
  const WEEKDAYS = ['日','月','火','水','木','金','土'];
  let currentUser = null;
  let historyMode = 'billing';

  // 締日ルール：毎月15日締め → 修正可能開始日を返す
  // 1〜20日：前月16日、21日〜末日：当月16日
  function getEditableFromDate() {
    const now = new Date();
    const day = now.getDate();
    let year = now.getFullYear();
    let month = now.getMonth() + 1;
    if (day <= 20) {
      month -= 1;
      if (month <= 0) { month = 12; year--; }
    }
    return `${year}-${String(month).padStart(2,'0')}-16`;
  }

  async function init() {
    const res = await fetch('/api/me');
    if (!res.ok) { location.href = '/login'; return; }
    currentUser = await res.json();

    if (currentUser.leave_oncall_enabled) {
      const drawer = document.getElementById('menuDrawer');
      const historyLink = drawer.querySelector('a[href="/history"]');
      if (historyLink) {
        const leaveLink = document.createElement('a');
        leaveLink.href = '/leave';
        leaveLink.textContent = '有給管理';
        historyLink.after(leaveLink);
        if (currentUser.oncall_eligible) {
          const oncallLink = document.createElement('a');
          oncallLink.href = '/oncall';
          oncallLink.textContent = 'オンコール';
          leaveLink.after(oncallLink);
        }
      }
    }

    const elName = document.getElementById('headerName');
    const elType = document.getElementById('headerType');
    if (elName) elName.textContent = currentUser.name;
    if (elType) elType.textContent = currentUser.type === 'nurse' ? '看護師' : currentUser.type;
    const typeLabel = currentUser.type === 'nurse' ? '看護師' : currentUser.type;
    const elUser = document.getElementById('headerUserName');
    if (elUser) elUser.textContent = `👤 ${currentUser.name}（${typeLabel}）`;
    buildMonthSelector();
    document.getElementById('mainContent').style.display = 'block';
    loadHistory();
  }

  function buildMonthSelector() {
    const sel = document.getElementById('monthSelect');
    const prev = sel.value;
    sel.innerHTML = '';
    const now = new Date();
    const cy = now.getFullYear(), cm = now.getMonth() + 1;
    for (let i = 0; i <= 12; i++) {
      let m = cm - i, y = cy;
      while (m <= 0) { m += 12; y--; }
      const opt = document.createElement('option');
      opt.value = `${y}-${m}`;
      if (historyMode === 'billing') {
        let prevM = m - 1, prevY = y;
        if (prevM <= 0) { prevM = 12; prevY--; }
        opt.textContent = `${y}年${m}月月次（${prevM}/16〜${m}/15）`;
      } else {
        opt.textContent = i === 0 ? `${y}年${m}月（当月）` : `${y}年${m}月`;
      }
      sel.appendChild(opt);
    }
    if (prev) sel.value = prev;
  }

  async function loadHistory() {
    const [year, month] = document.getElementById('monthSelect').value.split('-').map(Number);
    document.getElementById('loadingView').style.display    = 'block';
    document.getElementById('statsCardSection').style.display = 'none';
    document.getElementById('incentiveSection').style.display = 'none';
    document.getElementById('chartSection').style.display    = 'none';
    document.getElementById('tableSection').style.display    = 'none';

    try {
      const modeParam = historyMode === 'billing' ? '&mode=billing' : '';
      const res = await fetch(`/api/monthly-detail?year=${year}&month=${month}${modeParam}`);
      if (!res.ok) throw new Error((await res.json()).error);
      const data = await res.json();
      renderChart(data);
      renderTable(data);
      document.getElementById('loadingView').style.display    = 'none';
      document.getElementById('chartSection').style.display    = 'block';
      document.getElementById('tableSection').style.display    = 'block';
      if (historyMode === 'billing') {
        renderStatsCard(data);
        document.getElementById('statsCardSection').style.display = 'block';
        loadIncentiveEstimate(year, month);
      } else {
        document.getElementById('statsCardSection').style.display = 'none';
        document.getElementById('incentiveSection').style.display = 'none';
      }
    } catch (e) {
      document.getElementById('loadingView').textContent = '読み込みに失敗しました: ' + e.message;
    }
  }

  async function loadIncentiveEstimate(year, month) {
    try {
      const res = await fetch(`/api/incentive-estimate?payMonth=${year}-${month}`);
      if (!res.ok) return;
      const data = await res.json();
      renderIncentiveCard(data);
      document.getElementById('incentiveSection').style.display = 'block';
    } catch (_) {
      // インセンティブ見込の取得に失敗しても他の表示には影響しない
    }
  }

  function renderIncentiveCard(data) {
    const payDate = new Date(data.pay_date);
    const payLabel = `${payDate.getMonth()+1}月${payDate.getDate()}日`;
    const bStart = new Date(data.billing_start);
    const bEnd   = new Date(data.billing_end);
    const periodLabel = `${bStart.getMonth()+1}/${bStart.getDate()} ～ ${bEnd.getMonth()+1}/${bEnd.getDate()}`;

    let bodyHtml;
    if (data.incentive_triggered) {
      const amount = data.incentive_amount.toLocaleString('ja-JP');
      let detailHtml;
      if (data.type === 'nurse') {
        detailHtml = `超過 ${data.over_hours}時間（4,000円/時間）`;
      } else {
        detailHtml = `超過 ${data.over_units}単位（500円/単位）`;
      }
      bodyHtml = `
        <div class="incentive-amount-box">
          <div class="incentive-amount-label">見込額</div>
          <div class="incentive-amount-val">¥${amount}</div>
        </div>
        <p class="incentive-detail">${detailHtml}</p>`;
    } else {
      const threshold = data.threshold || 0;
      let remainHtml;
      if (data.type === 'nurse') {
        const total = data.total || 0;
        const remain = Math.max(0, threshold - total);
        remainHtml = `あと ${remain.toFixed(1)}時間`;
      } else {
        const total = data.total_units || 0;
        const remain = Math.max(0, threshold - total);
        remainHtml = `あと ${Math.ceil(remain)}単位`;
      }
      bodyHtml = `
        <div class="incentive-not-reached">
          <p class="incentive-not-reached-msg">インセンティブ未達</p>
          <p class="incentive-not-reached-remain">${remainHtml}</p>
        </div>`;
    }

    const noteHtml = (!data.is_finalized && data.days_remaining > 0)
      ? `<p class="incentive-note">※ 残り${data.days_remaining}日分未入力（見込額は変動します）</p>`
      : '';

    const isFirst = !document.getElementById('incentiveBody');
    const collapsed = isFirst ? true : document.getElementById('incentiveBody')?.classList.contains('collapsed');
    document.getElementById('incentiveCard').innerHTML = `
      <div class="incentive-card">
        <div class="incentive-card-header" id="incentiveToggle">
          <span class="incentive-card-title">💰 インセンティブ見込</span>
          <span class="incentive-card-period">${payLabel}支給（${periodLabel}）</span>
          <span class="incentive-toggle" id="incentiveArrow">${collapsed ? '▼' : '▲'}</span>
        </div>
        <div class="incentive-card-body${collapsed ? ' collapsed' : ''}" id="incentiveBody">
          ${bodyHtml}
          ${noteHtml}
        </div>
      </div>`;
    // Re-bind event listener for dynamically created incentive toggle
    const toggle = document.getElementById('incentiveToggle');
    if (toggle) toggle.addEventListener('click', toggleIncentive);
  }

  function renderStatsCard(data) {
    const s = data.stats;
    const isIncentive = !!s.incentive_triggered;
    const cls  = isIncentive ? ' incentive' : '';
    const targetTotal = s.target_total ?? 0;
    const worked = s.working_days || 0;
    const expected = s.expected_working_days || 0;
    const remainDays = Math.max(0, expected - worked);

    let goalLine, bigLabel, bigNum, bigUnit, subCols, subHtml, diffHtml;

    if (data.type === 'nurse') {
      const total = s.total || 0;
      if (data.billing_start && data.billing_end) {
        const bsM = new Date(data.billing_start + 'T00:00:00');
        const beM = new Date(data.billing_end + 'T00:00:00');
        const periodLabel = `${bsM.getMonth()+1}/${bsM.getDate()}〜${beM.getMonth()+1}/${beM.getDate()}`;
        goalLine = `${periodLabel} のインセンティブ目安時間：${targetTotal.toFixed(1)}時間`;
      } else {
        goalLine = `今月のインセンティブ目安時間：${targetTotal.toFixed(1)}時間`;
      }
      bigLabel = '合計時間'; bigNum = total.toFixed(1); bigUnit = '時間';
      subCols  = 'cols-3';
      subHtml  = `
        <div class="result-sub-box">
          <div class="result-sub-label">介護</div>
          <div class="result-sub-val">${(s.total_kaigo||0).toFixed(1)}<span class="result-sub-unit">時間</span></div>
        </div>
        <div class="result-sub-box">
          <div class="result-sub-label">医療</div>
          <div class="result-sub-val">${(s.total_iryo||0).toFixed(1)}<span class="result-sub-unit">時間</span></div>
        </div>
        <div class="result-sub-box">
          <div class="result-sub-label">稼働日数</div>
          <div class="result-sub-val">${worked}<span class="result-sub-unit">日</span></div>
        </div>`;
      const diff = targetTotal - total;
      diffHtml = diff > 0
        ? `<p class="result-diff-line remain">目安時間まであと ${diff.toFixed(1)}時間（残${remainDays}日）</p>`
        : '<p class="result-diff-line reached">インセンティブに到達しました 🎉</p>';
    } else {
      const actual = s.total_units || 0;
      if (data.billing_start && data.billing_end) {
        const bsM = new Date(data.billing_start + 'T00:00:00');
        const beM = new Date(data.billing_end + 'T00:00:00');
        const periodLabel = `${bsM.getMonth()+1}/${bsM.getDate()}〜${beM.getMonth()+1}/${beM.getDate()}`;
        goalLine = `${periodLabel} のインセンティブ目安単位：${targetTotal.toFixed(1)}単位`;
      } else {
        goalLine = `今月のインセンティブ目安単位：${targetTotal.toFixed(1)}単位`;
      }
      bigLabel = '合計単位数'; bigNum = String(actual); bigUnit = '単位';
      subCols  = 'cols-2';
      subHtml  = `
        <div class="result-sub-box">
          <div class="result-sub-label">合計単位数</div>
          <div class="result-sub-val">${actual}<span class="result-sub-unit">単位</span></div>
        </div>
        <div class="result-sub-box">
          <div class="result-sub-label">稼働日数</div>
          <div class="result-sub-val">${worked}<span class="result-sub-unit">日</span></div>
        </div>`;
      const diff = targetTotal - actual;
      diffHtml = diff > 0
        ? `<p class="result-diff-line remain">目安単位まであと ${Math.ceil(diff)}単位（残${remainDays}日）</p>`
        : '<p class="result-diff-line reached">インセンティブに到達しました 🎉</p>';
    }

    document.getElementById('statsCard').innerHTML = `
      <div class="result-card${cls}">
        <p class="result-goal-line">${goalLine}</p>
        <div class="result-big-total">
          <span class="result-big-label">${bigLabel}</span>
          <span class="result-big-num">${bigNum}</span>
          <span class="result-big-label">${bigUnit}</span>
        </div>
        ${diffHtml}
        <div class="result-sub-grid ${subCols}">${subHtml}</div>
      </div>`;
  }

  let _chartInstance = null;

  function renderChart(data) {
    const canvas = document.getElementById('visitChart');
    if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }

    const iline = data.stats.incentive_line ?? 0;
    const isNurse = data.type === 'nurse';
    const days = data.days;
    const labels = days.map(d => d.month != null ? `${d.month}/${d.day}` : String(d.day));

    // インセンティブラインのラベル
    const iLabel = isNurse ? `ライン ${iline}h` : `ライン ${iline}単位`;

    let datasets;
    if (isNurse) {
      datasets = [
        {
          label: '介護',
          data: days.map(d => d.kaigo ?? 0),
          backgroundColor: 'rgba(30, 64, 175, 0.7)',
          borderRadius: { topLeft: 0, topRight: 0, bottomLeft: 2, bottomRight: 2 },
          barPercentage: 0.7, categoryPercentage: 0.85, stack: 'v', order: 2
        },
        {
          label: '医療',
          data: days.map(d => d.iryo ?? 0),
          backgroundColor: 'rgba(154, 52, 18, 0.65)',
          borderRadius: { topLeft: 3, topRight: 3, bottomLeft: 0, bottomRight: 0 },
          barPercentage: 0.7, categoryPercentage: 0.85, stack: 'v', order: 1
        }
      ];
    } else {
      datasets = [{
        label: '単位数',
        data: days.map(d => d.value ?? 0),
        backgroundColor: 'rgba(16, 185, 129, 0.7)',
        borderRadius: 3,
        barPercentage: 0.7, categoryPercentage: 0.85
      }];
    }

    const yMax = isNurse
      ? Math.max(6, Math.ceil(Math.max(...days.map(d => (d.kaigo??0)+(d.iryo??0))) + 1))
      : Math.max(30, Math.ceil(Math.max(...days.map(d => d.value??0)) * 1.2));

    _chartInstance = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            position: 'top',
            labels: { boxWidth: 12, boxHeight: 12, padding: 12, font: { size: 11, weight: '600' } }
          },
          annotation: {
            annotations: {
              incentiveLine: {
                type: 'line',
                yMin: iline, yMax: iline,
                borderColor: '#E24B4A', borderWidth: 2, borderDash: [6, 4],
                label: {
                  display: true, content: iLabel, position: 'start',
                  backgroundColor: 'rgba(226, 75, 74, 0.85)', color: '#fff',
                  font: { size: 10, weight: '700' },
                  padding: { top: 2, bottom: 2, left: 6, right: 6 }, borderRadius: 4
                }
              }
            }
          },
          tooltip: {
            callbacks: {
              title: (items) => `${items[0].label}日`,
              label: (item) => isNurse
                ? `${item.dataset.label}: ${item.raw}時間`
                : `${item.raw}単位`
            }
          }
        },
        scales: {
          x: {
            stacked: isNurse,
            grid: { display: false },
            ticks: {
              font: { size: 9 }, maxRotation: 0,
              callback: function(val, idx) {
                return (idx + 1) % 5 === 1 ? this.getLabelForValue(val) : '';
              }
            }
          },
          y: {
            stacked: isNurse,
            beginAtZero: true, max: yMax,
            ticks: {
              font: { size: 10 },
              callback: v => isNurse ? v + 'h' : String(v)
            },
            grid: { color: 'rgba(0,0,0,0.06)' }
          }
        }
      }
    });
  }

  function renderTable(data) {
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const editableFrom = getEditableFromDate();

    // 表示中の月に締済行があるか（= 月の初日が修正可能開始日より前）
    const viewedFirstDay = `${data.year}-${String(data.month).padStart(2,'0')}-01`;
    document.getElementById('prevNotice').style.display = viewedFirstDay < editableFrom ? 'block' : 'none';

    const head = document.getElementById('tableHead');
    const body = document.getElementById('tableBody');
    body.innerHTML = '';

    if (data.type === 'nurse') {
      head.innerHTML = '<tr><th>日付</th><th><span class="badge-kaigo">介護</span></th><th><span class="badge-iryo">医療</span></th><th>合計</th><th></th></tr>';
      for (const d of data.days) {
        const dm = d.month != null ? d.month : data.month;
        const dy = d.year != null ? d.year : data.year;
        const dateStr = `${dy}-${String(dm).padStart(2,'0')}-${String(d.day).padStart(2,'0')}`;
        const isFuture  = dateStr > todayStr;
        const isClosed  = !isFuture && dateStr < editableFrom;
        const hasData   = d.kaigo != null || d.iryo != null;
        const wdClass   = d.weekday === '土' ? 'sat' : d.weekday === '日' ? 'sun' : '';
        const trClass   = isFuture ? 'future-row' : (!hasData ? 'no-data-row' : '');
        const editBtn   = isFuture
          ? `<button class="btn-edit disabled" disabled>修正</button>`
          : isClosed
            ? `<span class="closed-label">締済</span>`
            : `<button class="btn-edit active" data-action="edit-date" data-date="${esc(dateStr)}">修正</button>`;
        const tr = document.createElement('tr');
        if (trClass) tr.className = trClass;
        const dateLabel = d.month != null ? `${d.month}/${d.day}（${d.weekday}）` : `${data.month}/${d.day}（${d.weekday}）`;
        tr.innerHTML = `
          <td class="date-cell"><span class="${wdClass}">${dateLabel}</span></td>
          <td>${d.kaigo != null ? d.kaigo.toFixed(1) : '—'}</td>
          <td>${d.iryo  != null ? d.iryo.toFixed(1)  : '—'}</td>
          <td>${d.total != null ? d.total.toFixed(1) : '—'}</td>
          <td>${editBtn}</td>`;
        body.appendChild(tr);
      }
    } else {
      head.innerHTML = '<tr><th>日付</th><th>単位数</th><th></th></tr>';
      for (const d of data.days) {
        const dm = d.month != null ? d.month : data.month;
        const dy = d.year != null ? d.year : data.year;
        const dateStr = `${dy}-${String(dm).padStart(2,'0')}-${String(d.day).padStart(2,'0')}`;
        const isFuture = dateStr > todayStr;
        const isClosed = !isFuture && dateStr < editableFrom;
        const wdClass  = d.weekday === '土' ? 'sat' : d.weekday === '日' ? 'sun' : '';
        const trClass  = isFuture ? 'future-row' : (d.value == null ? 'no-data-row' : '');
        const editBtn  = isFuture
          ? `<button class="btn-edit disabled" disabled>修正</button>`
          : isClosed
            ? `<span class="closed-label">締済</span>`
            : `<button class="btn-edit active" data-action="edit-date" data-date="${esc(dateStr)}">修正</button>`;
        const tr = document.createElement('tr');
        if (trClass) tr.className = trClass;
        const dateLabel = d.month != null ? `${d.month}/${d.day}（${d.weekday}）` : `${data.month}/${d.day}（${d.weekday}）`;
        tr.innerHTML = `
          <td class="date-cell"><span class="${wdClass}">${dateLabel}</span></td>
          <td>${d.value != null ? d.value : '—'}</td>
          <td>${editBtn}</td>`;
        body.appendChild(tr);
      }
    }
  }

  // ── #tableBody イベント委譲 ─────────────────────────────────────
  document.getElementById('tableBody').addEventListener('click', e => {
    const btn = e.target.closest('[data-action="edit-date"]');
    if (btn) editDate(btn.dataset.date);
  });

  function editDate(dateStr) {
    location.href = `/?date=${dateStr}`;
  }

  function toggleChart() {
    const body = document.getElementById('chartBody');
    const arrow = document.getElementById('chartArrow');
    if (!body) return;
    body.classList.toggle('collapsed');
    arrow.textContent = body.classList.contains('collapsed') ? '▼' : '▲';
  }

  function toggleIncentive() {
    const body = document.getElementById('incentiveBody');
    const arrow = document.getElementById('incentiveArrow');
    if (!body) return;
    body.classList.toggle('collapsed');
    arrow.textContent = body.classList.contains('collapsed') ? '▼' : '▲';
  }

  function switchHistoryMode(mode) {
    if (historyMode === mode) return;
    historyMode = mode;
    const btnB = document.getElementById('histModeBilling');
    const btnM = document.getElementById('histModeMonthly');
    if (mode === 'billing') {
      btnB.style.background = 'var(--blue)'; btnB.style.color = '#fff';
      btnM.style.background = '#fff'; btnM.style.color = 'var(--blue)';
    } else {
      btnM.style.background = 'var(--blue)'; btnM.style.color = '#fff';
      btnB.style.background = '#fff'; btnB.style.color = 'var(--blue)';
    }
    buildMonthSelector();
    loadHistory();
  }

  // ── addEventListener bindings ──
  document.getElementById('monthSelect').addEventListener('change', loadHistory);
  document.getElementById('chartToggle').addEventListener('click', toggleChart);
  document.getElementById('histModeBilling').addEventListener('click', () => switchHistoryMode('billing'));
  document.getElementById('histModeMonthly').addEventListener('click', () => switchHistoryMode('monthly'));

  init();
</script>
